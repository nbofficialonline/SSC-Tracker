<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Careerwill SSC CGL Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root{
        --brand:#d97706;--brand-2:#0f766e;--brand-3:#1d4ed8;--brand-soft:#f3b164;
        --bg:#f6f1e8;--bg-2:#efe7db;--surface:#fffdf8;--surface2:#f5efe5;
        --text:#1c1d22;--text2:#353c47;--muted:#788192;
        --border:#e4ddd3;--border2:#cdbfae;
        --shadow:0 12px 30px rgba(20,20,30,.08);
        --shadow2:0 20px 60px rgba(20,20,30,.18);
        --shadow3:0 40px 100px rgba(20,20,30,.24);
        --r:14px;--r2:22px;
        --tr:0.2s cubic-bezier(.4,0,.2,1);
        --sidebar-w:260px;
        --font:'Outfit',sans-serif;
        --display:'Space Grotesk',sans-serif;
        --mono:'IBM Plex Mono',monospace;
      }
      [data-theme=dark]{
        --bg:#20180f;--bg-2:#19120a;--surface:#2a2116;--surface2:#332819;
        --text:#f1e5d6;--text2:#d8c6a3;--muted:#b9aa8a;
        --border:#3a2f1d;--border2:#4a3b24;
        --shadow:0 12px 30px rgba(0,0,0,.45);
        --shadow2:0 24px 60px rgba(0,0,0,.5);
        --shadow3:0 40px 120px rgba(0,0,0,.6);
        --brand:#d79921;--brand-2:#8f9d6a;--brand-3:#7e9cd8;--brand-soft:#d65d0e;
      }
      *{box-sizing:border-box;margin:0;padding:0}
      html,body{min-height:100%;font-family:var(--font);background:var(--bg);color:var(--text);overflow-x:hidden;transition:background .3s,color .3s}
      body{position:relative}
      body::before{
        content:'';position:fixed;inset:0;z-index:-1;pointer-events:none;
        background:
          radial-gradient(circle at 12% 18%, rgba(245,158,11,.2), transparent 42%),
          radial-gradient(circle at 85% 12%, rgba(15,118,110,.2), transparent 44%),
          radial-gradient(circle at 52% 90%, rgba(29,78,216,.16), transparent 48%),
          linear-gradient(180deg, rgba(255,255,255,.5), rgba(255,255,255,0));
      }
      [data-theme=dark] body::before{
        background:
          radial-gradient(circle at 12% 18%, rgba(215,153,33,.16), transparent 40%),
          radial-gradient(circle at 80% 12%, rgba(143,157,106,.12), transparent 42%),
          radial-gradient(circle at 50% 90%, rgba(126,156,216,.12), transparent 44%),
          linear-gradient(180deg, rgba(34,26,15,.75), rgba(34,26,15,0));
      }
      [data-theme=dark] .sidebar{background:linear-gradient(175deg,#2a2116 0%,#1b130c 100%)}
      [data-theme=dark] .topbar{border-color:var(--border2)}
      [data-theme=dark] .topic-list-head{background:linear-gradient(135deg,#3a2f1d,#2a2116);border-color:#4a3b24}
      [data-theme=dark] .btn.dark{background:#3a2f1d;color:var(--text);box-shadow:0 4px 14px rgba(0,0,0,.35)}
      h1,h2,h3{font-family:var(--display);letter-spacing:-.02em}
      button,input,select{font-family:inherit}
      button{cursor:pointer}

      /* Animations */
      @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
      @keyframes pageIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
      @keyframes spin{to{transform:rotate(360deg)}}
      @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
      @keyframes shimmer{100%{transform:translateX(100%)}}
      @keyframes toastIn{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}
      @keyframes toastOut{from{transform:translateX(0);opacity:1}to{transform:translateX(110%);opacity:0}}
      @keyframes checkBounce{0%{transform:scale(1)}40%{transform:scale(1.25)}70%{transform:scale(.92)}100%{transform:scale(1)}}
      @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

      /* Login */
      .login-page{
        min-height:100vh;display:flex;align-items:center;justify-content:center;
        padding:34px 18px;
        background:linear-gradient(135deg,#0c111a 0%,#0c1730 55%,#0a0f1b 100%);
        position:relative;overflow:hidden;
      }
      .login-orb{position:absolute;border-radius:50%;filter:blur(90px);pointer-events:none;opacity:.38}
      .login-orb.a{width:380px;height:380px;background:radial-gradient(circle,#f59e0b,transparent);top:-80px;left:-80px}
      .login-orb.b{width:320px;height:320px;background:radial-gradient(circle,#0f766e,transparent);bottom:-80px;right:-90px}
      .login-orb.c{width:240px;height:240px;background:radial-gradient(circle,#1d4ed8,transparent);top:45%;left:60%}
      .login-wrap{
        width:min(980px,96vw);display:grid;grid-template-columns:1.05fr .95fr;gap:20px;
        align-items:stretch;position:relative;z-index:1;animation:pageIn .5s ease;
      }
      .login-card{
        padding:40px 36px;border-radius:26px;position:relative;z-index:1;
        background:rgba(9,12,20,.85);
        border:1px solid rgba(245,158,11,.22);
        box-shadow:0 30px 70px rgba(0,0,0,.45);
        backdrop-filter:blur(24px);
        color:#f8fafc;
      }
      .login-logo{text-align:left;margin-bottom:26px;padding-bottom:18px;border-bottom:1px solid rgba(245,158,11,.18)}
      .login-mark{
        width:64px;height:64px;border-radius:18px;
        display:flex;align-items:center;justify-content:center;
        color:#fff;font-weight:800;font-size:18px;letter-spacing:.5px;
        background:linear-gradient(135deg,#f59e0b,#f97316);
        box-shadow:0 0 30px rgba(245,158,11,.45);
        animation:float 4s ease-in-out infinite;
        margin-bottom:12px;
      }
      .login-logo h1{color:#fff;font-size:20px;font-weight:800;margin-bottom:4px}
      .login-logo p{color:var(--brand-soft);font-size:12px;font-weight:600;letter-spacing:.3px}
      .login-logo small{display:block;margin-top:3px;color:rgba(255,255,255,.5);font-size:11px}
      .tabs{display:flex;border-bottom:1px solid rgba(255,255,255,.12);margin-bottom:20px}
      .tab{flex:1;border:0;background:transparent;color:rgba(255,255,255,.52);padding:10px 6px;font-size:12.5px;font-weight:700;position:relative;transition:var(--tr)}
      .tab.active{color:#fff}
      .tab.active:after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:2px;background:var(--brand);border-radius:999px}
      .login-form{display:none;animation:fadeUp .22s ease}
      .login-form.active{display:block}
      .field{margin-bottom:14px}
      .field label{display:block;color:rgba(255,255,255,.72);font-size:11px;text-transform:uppercase;letter-spacing:.6px;font-weight:700;margin-bottom:7px}
      .field input,.field select{
        width:100%;min-height:44px;border:1.5px solid rgba(245,158,11,.32);border-radius:12px;
        padding:10px 13px;color:#fff;background:rgba(255,255,255,.08);font-size:14px;outline:none;transition:var(--tr);
      }
      .field input::placeholder{color:rgba(255,255,255,.4)}
      .field input:focus,.field select:focus{border-color:var(--brand);background:rgba(255,255,255,.15);box-shadow:0 0 0 3px rgba(245,158,11,.2)}
      .login-btn{
        width:100%;min-height:46px;border:0;border-radius:12px;
        background:linear-gradient(135deg,#f59e0b,#f97316);
        color:#fff;font-size:14px;font-weight:800;
        display:flex;align-items:center;justify-content:center;gap:8px;
        box-shadow:0 10px 26px rgba(245,158,11,.32);transition:var(--tr);
      }
      .login-btn:hover{transform:translateY(-2px);box-shadow:0 14px 34px rgba(245,158,11,.4)}
      .login-btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
      .note{margin-top:12px;padding:11px 13px;border-radius:12px;background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.22);color:rgba(255,255,255,.68);font-size:12px;line-height:1.55}
      .login-side{
        border-radius:26px;padding:32px;background:linear-gradient(160deg,rgba(255,255,255,.95),rgba(255,247,237,.9));
        box-shadow:0 24px 60px rgba(8,12,20,.32);color:#1c1d22;display:flex;align-items:center;
      }
      .login-side-inner{display:grid;gap:12px}
      .login-side-badge{display:inline-flex;align-items:center;gap:6px;border-radius:999px;background:#0f172a;color:#fff;padding:5px 10px;font-size:11px;letter-spacing:.4px;text-transform:uppercase;width:max-content}
      .login-side h2{font-size:22px}
      .login-side p{color:#5b6473;font-size:13px;line-height:1.6}
      .login-list{display:grid;gap:10px}
      .login-list div{padding:12px 13px;border-radius:14px;border:1px solid rgba(217,119,6,.18);background:rgba(255,255,255,.75)}
      .login-list b{display:block;font-size:13px;font-weight:700}
      .login-list span{display:block;font-size:12px;color:#5b6473;margin-top:4px}
      .login-badges{display:flex;flex-wrap:wrap;gap:8px}
      .login-badges span{background:#111827;color:#fff;border-radius:999px;padding:6px 10px;font-size:11px;letter-spacing:.3px;text-transform:uppercase}

      /* App shell */
      .app{min-height:100vh;display:grid;grid-template-columns:var(--sidebar-w) minmax(0,1fr);background:var(--bg)}
      .sidebar{
        height:100vh;position:sticky;top:0;padding:20px 14px;color:#f4ede2;
        background:linear-gradient(175deg,#3a2f1d 0%,#251b10 100%);
        box-shadow:6px 0 24px rgba(20,16,10,.35);
        animation:pageIn .32s ease;z-index:10;display:flex;flex-direction:column;gap:0;
        overflow-y:auto;overflow-x:hidden;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.15) transparent;
      }
      .sidebar::-webkit-scrollbar{width:4px}
      .sidebar::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:4px}
      .brand{display:flex;gap:12px;align-items:center;padding:10px 8px 20px;margin-bottom:12px;border-bottom:1px solid rgba(255,255,255,.08)}
      .brand-mark{
        width:40px;height:40px;border-radius:14px;flex-shrink:0;display:flex;align-items:center;justify-content:center;
        background:linear-gradient(135deg,#f59e0b,#f97316);color:#fff;font-weight:800;font-size:12px;letter-spacing:.6px;
        box-shadow:0 8px 20px rgba(245,158,11,.35);
      }
      .brand h2{font-size:15px;color:#fff;font-weight:800;line-height:1.2}
      .brand p{font-size:11px;margin-top:2px;color:rgba(255,255,255,.55);font-weight:500}
      .nav{display:grid;gap:6px;margin-bottom:6px}
      .nav button{
        width:100%;border:0;border-radius:12px;background:rgba(255,255,255,.06);
        color:rgba(255,255,255,.78);padding:12px 14px;text-align:left;font-weight:700;font-size:13px;line-height:1.25;
        transition:var(--tr);display:flex;align-items:center;gap:8px;
      }
      .nav button:hover,.nav button.active{background:rgba(215,153,33,.24);color:#fff}
      .side-divider{height:1px;background:rgba(255,255,255,.08);margin:10px 8px}
      .side-card{
        margin-top:auto;padding:12px 12px 10px;border-radius:14px;background:rgba(255,255,255,.05);
        border:1px solid rgba(255,255,255,.1);font-size:12px;line-height:1.45;color:rgba(255,255,255,.72);
      }
      .side-card-title{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px}
      .side-card b{color:#fff;font-size:14px;word-break:break-word}
      .side-card-meta{font-size:11px;color:rgba(255,255,255,.55)}
      .side-card-row{display:flex;align-items:center;justify-content:space-between;gap:10px}
      .streak-badge{
        display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,#f59e0b,#f97316);
        color:#111827;border-radius:999px;padding:4px 10px;font-size:11px;font-weight:800;white-space:nowrap;
      }

      /* Main */
      .main{min-width:0;padding:22px 26px 32px;transition:background .3s}
      .topbar{
        display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:18px;
        padding:12px 14px;border-radius:16px;background:var(--surface);border:1px solid var(--border);box-shadow:var(--shadow);
        position:sticky;top:16px;z-index:5;
      }
      .title h1{font-size:22px;color:var(--text);font-weight:800;margin-bottom:2px}
      .title p{font-size:12px;color:var(--muted);font-weight:500}
      .actions{display:flex;gap:7px;flex-wrap:wrap;align-items:center}

      /* Buttons */
      .btn{
        min-height:36px;border-radius:10px;padding:7px 13px;border:1.5px solid transparent;font-size:12.5px;font-weight:700;
        display:inline-flex;align-items:center;justify-content:center;gap:6px;transition:var(--tr);
      }
      .btn:hover{transform:translateY(-1px)}
      .btn:active{transform:translateY(0)}
      .btn.primary{color:#fff;background:linear-gradient(135deg,#f59e0b,#f97316);box-shadow:0 6px 18px rgba(245,158,11,.24)}
      .btn.dark{color:#fff;background:#111827;box-shadow:0 4px 14px rgba(17,24,39,.3)}
      .btn.ghost{background:var(--surface);color:var(--text2);border-color:var(--border)}
      .btn.warn{background:#fef3c7;color:#92400e;border-color:#fde68a}
      .btn.danger{background:#fee2e2;color:#991b1b;border-color:#fecaca}
      .btn.green{background:#10b981;color:#fff;box-shadow:0 4px 14px rgba(16,185,129,.22)}
      .btn.teal{background:#0f766e;color:#fff}
      .btn.sm{min-height:30px;padding:5px 10px;font-size:12px;border-radius:8px}

      /* Metrics grid */
      .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(178px,1fr));gap:14px}
      .metric{
        background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:16px;box-shadow:var(--shadow);
        position:relative;overflow:hidden;transition:transform .2s,box-shadow .2s,background .3s,border-color .3s;
      }
      .metric:before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--brand),var(--brand-2))}
      .metric:hover{transform:translateY(-2px);box-shadow:var(--shadow2)}
      .metric b{display:block;font-size:26px;color:var(--text);line-height:1;margin-bottom:6px;font-weight:800}
      .metric span{font-size:12px;color:var(--muted);font-weight:700;display:block}
      .metric small{display:block;margin-top:6px;font-size:11px;color:var(--muted)}

      /* Cards */
      .card{
        margin-top:13px;padding:18px;border-radius:18px;background:var(--surface);border:1px solid var(--border);
        box-shadow:var(--shadow);transition:background .3s,border-color .3s;
      }
      .card-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:13px}
      .card h3{font-size:14px;color:var(--text);font-weight:800}
      .muted{color:var(--muted)}
      .small{font-size:12px}

      /* Progress bars */
      .progress{height:9px;border-radius:999px;background:var(--border);overflow:hidden}
      .bar{height:100%;width:0;border-radius:999px;background:linear-gradient(90deg,var(--brand),var(--brand-2));transition:width .4s ease}
      .hero-progress{height:12px}

      /* Filters */
      .filters{display:grid;grid-template-columns:2fr repeat(3,minmax(120px,1fr));gap:10px}
      .input input,.input select{
        width:100%;min-height:40px;border:1.5px solid var(--border);border-radius:12px;background:var(--surface);color:var(--text);
        padding:8px 11px;outline:none;transition:var(--tr);font-size:13px;
      }
      .input input:focus,.input select:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(245,158,11,.16)}

      /* Category grid */
      .cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(172px,1fr));gap:10px}
      .cat-card{
        background:var(--surface2);border:1.5px solid var(--border);border-radius:14px;padding:13px 14px;text-align:left;cursor:pointer;width:100%;
        transition:var(--tr);
      }
      .cat-card:hover{border-color:var(--brand-soft);transform:translateY(-2px);box-shadow:0 8px 22px rgba(245,158,11,.14)}
      .cat-card.active{border-color:var(--brand);background:linear-gradient(180deg,rgba(255,247,237,.9),var(--surface));box-shadow:0 10px 26px rgba(245,158,11,.16)}
      .cat-card b{display:block;font-size:13px;color:var(--text);font-weight:700;margin-bottom:5px}
      .cat-card span{display:block;font-size:11.5px;color:var(--muted);margin-bottom:7px}
      .cat-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
      .cat-count{font-size:11px;color:var(--muted);font-weight:700}

      /* Topic groups */
      .topic-group{
        margin-top:10px;border:1px solid var(--border);border-radius:16px;background:var(--surface);overflow:hidden;
        transition:box-shadow .2s,background .3s,border-color .3s;content-visibility:auto;contain-intrinsic-size:220px;
      }
      .topic-group:hover{box-shadow:var(--shadow)}
      .topic-group summary{
        display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 15px;cursor:pointer;list-style:none;user-select:none;
        background:var(--surface2);border-bottom:1px solid var(--border);transition:background .18s;
      }
      .topic-group summary::-webkit-details-marker{display:none}
      .topic-group summary:hover{background:var(--bg)}
      .group-title{font-size:13.5px;font-weight:800;color:var(--text)}
      .group-actions{display:flex;gap:6px;align-items:center}
      .subsection{padding:0 14px}
      .subsection h4{
        display:flex;justify-content:space-between;align-items:center;font-size:11.5px;color:var(--muted);font-weight:700;letter-spacing:.4px;text-transform:uppercase;
        padding:9px 0 6px;border-bottom:1px solid var(--border);margin-bottom:2px;
      }
      .subsection-actions{display:flex;gap:5px;align-items:center}
      .topic{
        display:grid;grid-template-columns:18px 1fr auto;align-items:start;gap:9px;padding:8px 0;
        border-top:1px dashed var(--border);transition:background .15s,transform .15s;border-radius:8px;
      }
      .topic:first-of-type{border-top:0}
      .topic:hover{background:var(--surface2);transform:translateX(2px);padding-left:4px;padding-right:4px}
      .topic input[type=checkbox]{width:17px;height:17px;margin-top:2px;accent-color:var(--brand);cursor:pointer;flex-shrink:0}
      .topic input:checked{animation:checkBounce .25s ease}
      .topic-title{color:var(--text2);font-size:13px;line-height:1.35;font-weight:500}
      .done{opacity:.55;text-decoration:line-through;text-decoration-color:var(--muted)}
      .topic.saving{opacity:.65;pointer-events:none}

      /* Pills */
      .pill{
        display:inline-flex;align-items:center;justify-content:center;white-space:nowrap;border-radius:999px;border:1px solid var(--border);
        padding:3px 8px;background:var(--surface);color:var(--text2);font-size:11px;font-weight:700;
      }
      .pill.high{background:#fff7ed;color:#c2410c;border-color:#fed7aa}
      .pill.medium{background:#eff6ff;color:#1d4ed8;border-color:#bfdbfe}
      .pill.low{background:var(--surface2);color:var(--muted);border-color:var(--border)}
      .pill.active{background:#d1fae5;color:#047857;border-color:#a7f3d0}
      .pill.disabled{background:#fee2e2;color:#991b1b;border-color:#fecaca}
      .pill.expired{background:#fef3c7;color:#92400e;border-color:#fde68a}
      .pill.admin{background:#eef2ff;color:#3730a3;border-color:#c7d2fe}

      /* Topic list header */
      .topic-list-head{
        margin-top:13px;padding:15px 18px;border:1px solid #1f2937;border-radius:18px;
        background:linear-gradient(135deg,#111827,#0f172a);color:#fff;box-shadow:var(--shadow);
        display:flex;align-items:center;justify-content:space-between;gap:12px;
      }
      .topic-list-head h3{color:#fff;font-size:15px;font-weight:800}
      .topic-list-head p{margin-top:3px;color:rgba(255,255,255,.65);font-size:12px}
      .topic-list-head .pill{background:rgba(255,255,255,.14);border-color:rgba(255,255,255,.22);color:#fff}
      .tlh-actions{display:flex;gap:7px;align-items:center}

      /* Charts */
      .dashboard-grid{display:grid;grid-template-columns:1fr 1.25fr;gap:13px;margin-top:13px}
      .chart-card{min-height:230px}
      .donut-wrap{display:grid;grid-template-columns:155px 1fr;gap:16px;align-items:center}
      .donut{width:150px;height:150px;border-radius:50%;display:grid;place-items:center;box-shadow:inset 0 0 0 1px var(--border)}
      .donut-center{width:104px;height:104px;border-radius:50%;display:grid;place-items:center;background:var(--surface);box-shadow:var(--shadow);text-align:center}
      .donut-center b{display:block;color:var(--text);font-size:24px;line-height:1;font-weight:800}
      .donut-center span{display:block;margin-top:4px;color:var(--muted);font-size:11px;font-weight:700}
      .chart-list{display:grid;gap:9px}
      .chart-row{display:grid;gap:5px}
      .chart-row-head{display:flex;justify-content:space-between;gap:10px;color:var(--text2);font-size:12px;font-weight:700}
      .bar-track{height:9px;border-radius:999px;overflow:hidden;background:var(--border)}
      .bar-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--brand),var(--brand-2));transition:width .45s ease}
      .bar-fill.green{background:linear-gradient(90deg,#10b981,var(--brand-2))}
      .bar-fill.warn{background:linear-gradient(90deg,var(--brand),#f97316)}
      .bar-fill.red{background:linear-gradient(90deg,#ef4444,#f97316)}

      /* Hero card */
      .hero-card{
        position:relative;overflow:hidden;background:linear-gradient(135deg,var(--surface) 0%,var(--surface2) 60%,rgba(255,247,237,.9) 100%);
      }
      .hero-card:after{content:'';position:absolute;width:180px;height:180px;right:-60px;top:-70px;border-radius:50%;background:rgba(245,158,11,.14);pointer-events:none}

      /* Study timer */
      .timer-bar{
        display:flex;align-items:center;gap:10px;padding:10px 15px;border-radius:12px;background:var(--surface2);border:1px solid var(--border);margin-top:10px;
        font-family:var(--mono);font-size:14px;font-weight:600;color:var(--text);transition:background .3s,border-color .3s;
      }
      .timer-display{font-size:22px;font-weight:700;color:var(--brand);min-width:70px}
      .timer-label{font-size:11px;color:var(--muted);font-family:var(--font);font-weight:700;flex:1}
      .timer-running .timer-display{animation:pulse 1.5s ease-in-out infinite}
      .study-focus{display:grid;grid-template-columns:minmax(260px,1fr) 1.4fr;gap:13px}

      /* Empty / loading */
      .empty{padding:30px;text-align:center;color:var(--muted);background:var(--surface);border:1px dashed var(--border);border-radius:16px;margin-top:13px}
      .loading{min-height:200px;display:grid;place-items:center;color:var(--muted)}
      .skeleton{position:relative;overflow:hidden;background:var(--border);border-radius:10px}
      .skeleton:after{content:'';position:absolute;inset:0;transform:translateX(-100%);background:linear-gradient(90deg,transparent,rgba(255,255,255,.55),transparent);animation:shimmer 1.2s infinite}
      [data-theme=dark] .skeleton:after{background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent)}
      .loader-lines{display:grid;gap:9px;padding:16px}
      .loader-lines .skeleton:nth-child(1){height:18px;width:60%}
      .loader-lines .skeleton:nth-child(2){height:13px;width:85%}
      .loader-lines .skeleton:nth-child(3){height:13px;width:75%}
      .loader-lines .skeleton:nth-child(4){height:13px;width:90%}
      .spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--brand);border-radius:50%;animation:spin .75s linear infinite}

      /* Toast */
      .toast-zone{position:fixed;top:14px;right:14px;z-index:60;display:grid;gap:7px;pointer-events:none}
      .toast{min-width:240px;max-width:340px;padding:11px 13px;border-radius:11px;border-left:4px solid var(--brand);color:#fff;background:#0f172a;box-shadow:var(--shadow2);font-size:13px;animation:toastIn .22s ease;pointer-events:all}
      .toast.ok{border-left-color:#10b981}
      .toast.err{border-left-color:#ef4444}

      /* Modal */
      .modal-shade{position:fixed;inset:0;z-index:40;background:rgba(15,23,42,.55);display:flex;align-items:flex-start;justify-content:center;padding:40px 14px;overflow:auto;backdrop-filter:blur(4px)}
      .modal{width:min(900px,100%);padding:20px;background:var(--surface);border-radius:22px;box-shadow:var(--shadow3);animation:pageIn .22s ease;border:1px solid var(--border)}
      .modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
      .modal-head h3{font-size:16px;font-weight:800;color:var(--text)}
      .modal-close{border:0;background:var(--surface2);color:var(--muted);width:32px;height:32px;border-radius:8px;font-size:18px;display:flex;align-items:center;justify-content:center}
      .modal-close:hover{background:#fee2e2;color:#ef4444}

      /* Keyboard shortcut badge */
      .kbd{display:inline-flex;align-items:center;gap:2px;font-family:var(--mono);font-size:10px;background:var(--surface2);border:1px solid var(--border2);border-radius:5px;padding:1px 5px;color:var(--muted)}

      /* Admin */
      .admin-user{margin-top:10px;padding:16px;background:var(--surface);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow);transition:background .3s,border-color .3s;content-visibility:auto;contain-intrinsic-size:160px}
      .admin-user-head{display:flex;align-items:flex-start;justify-content:space-between;gap:14px}
      .admin-user-info{display:grid;gap:6px;min-width:0}
      .admin-user-title{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
      .admin-user-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap;color:var(--muted)}
      .admin-actions{display:flex;flex-wrap:wrap;gap:8px;align-items:center;justify-content:flex-end}
      .action-select{
        min-height:32px;border:1.5px solid var(--border);border-radius:10px;background:var(--surface);color:var(--text);
        padding:6px 10px;font-size:12px;font-weight:700;outline:none;transition:var(--tr);
      }
      .action-select:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(245,158,11,.12)}
      .admin-tabs{display:flex;gap:7px;flex-wrap:wrap;margin:0 0 13px}
      .admin-tabs button{border:1px solid var(--border);border-radius:11px;background:var(--surface);color:var(--text2);padding:8px 13px;font-weight:700;font-size:13px;transition:var(--tr)}
      .admin-tabs button.active,.admin-tabs button:hover{color:#fff;background:#111827;border-color:#111827;transform:translateY(-1px)}
      .admin-layout{display:grid;grid-template-columns:minmax(0,1fr);gap:13px}
      .user-row{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;padding:12px 0;border-top:1px solid var(--border)}
      .user-row:first-of-type{border-top:0}
      .setting-row{display:flex;align-items:center;justify-content:space-between;gap:13px;padding:13px;border:1px solid var(--border);border-radius:13px;background:var(--surface2)}
      .switch{width:50px;height:28px;border:0;border-radius:999px;background:var(--border2);padding:3px;transition:var(--tr)}
      .switch:before{content:'';display:block;width:22px;height:22px;border-radius:50%;background:#fff;box-shadow:0 2px 6px rgba(15,23,42,.2);transition:var(--tr)}
      .switch.on{background:#10b981}
      .switch.on:before{transform:translateX(22px)}
      .topic-admin-list{max-height:400px;overflow:auto;border:1px solid var(--border);border-radius:13px}
      .topic-admin-row{display:grid;grid-template-columns:24px 1fr auto;gap:9px;align-items:start;padding:10px 13px;border-top:1px solid var(--border);content-visibility:auto;contain-intrinsic-size:64px}
      .topic-admin-row:first-child{border-top:0}
      .table-wrap{overflow:auto;border:1px solid var(--border);border-radius:11px}
      table{width:100%;border-collapse:collapse;font-size:12px}
      th,td{padding:9px;text-align:left;vertical-align:top;border-bottom:1px solid var(--border)}
      th{color:var(--text);background:var(--surface2);font-weight:700}
      .admin-user.saving{opacity:.7;pointer-events:none}
      @keyframes savedFlash{0%{background:#ecfdf5;border-color:#86efac}100%{background:var(--surface);border-color:var(--border)}}
      .admin-user.saved{animation:savedFlash .75s ease}

      /* Hamburger (mobile) */
      .hamburger{display:none;border:0;background:var(--surface);border-radius:10px;width:38px;height:38px;align-items:center;justify-content:center;flex-direction:column;gap:4px;cursor:pointer;box-shadow:var(--shadow)}
      .hamburger span{display:block;width:20px;height:2px;background:var(--text);border-radius:2px;transition:var(--tr)}
      .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:9;backdrop-filter:blur(2px)}

      /* Theme toggle */
      .theme-btn{border:1.5px solid var(--border);background:var(--surface);color:var(--text2);border-radius:10px;min-width:64px;height:36px;padding:0 12px;display:flex;align-items:center;justify-content:center;font-size:12.5px;font-weight:700;transition:var(--tr);white-space:nowrap}
      .theme-btn:hover{border-color:var(--brand);color:var(--brand)}

      [data-theme=dark] .sidebar{background:linear-gradient(175deg,#2a2116 0%,#1b130c 100%)}
      [data-theme=dark] .topbar{border-color:var(--border2)}
      [data-theme=dark] .topic-list-head{background:linear-gradient(135deg,#3a2f1d,#2a2116);border-color:#4a3b24}
      [data-theme=dark] .hero-card{background:linear-gradient(135deg,#2f2416 0%,#2a2116 60%,#3a2f1d 100%)}
      [data-theme=dark] .chart-row-head{color:var(--text2)}
      [data-theme=dark] .bar-track{background:#3a2f1d}
      [data-theme=dark] .bar-fill.green{background:linear-gradient(90deg,#8f9d6a,#98a84a)}
      [data-theme=dark] .bar-fill.warn{background:linear-gradient(90deg,#d79921,#d65d0e)}
      [data-theme=dark] .btn.dark{background:#3a2f1d;color:var(--text);box-shadow:0 4px 14px rgba(0,0,0,.35)}

      /* Performance hints */
      .card,.metric,.cat-card{content-visibility:auto;contain-intrinsic-size:160px}

      /* Responsive */
      @media(max-width:980px){
        .dashboard-grid,.donut-wrap{grid-template-columns:1fr}
        .study-focus{grid-template-columns:1fr}
        .donut{margin:0 auto}
      }
      @media(max-width:900px){
        .login-wrap{grid-template-columns:1fr}
        .login-side{order:-1}
      }
      @media(max-width:860px){
        .app{grid-template-columns:1fr}
        .sidebar{height:auto;position:fixed;top:0;left:0;width:var(--sidebar-w);height:100vh;transform:translateX(-100%);transition:transform .28s ease;z-index:11}
        .sidebar.open{transform:translateX(0)}
        .sidebar-overlay.show{display:block}
        .main{padding:14px}
        .hamburger{display:flex}
        .topbar{align-items:flex-start;flex-direction:column;gap:9px}
        .filters{grid-template-columns:1fr 1fr}
      }
      @media(max-width:560px){
        .main{padding:10px}
        .filters{grid-template-columns:1fr}
        .grid,.cat-grid{grid-template-columns:1fr 1fr}
        .actions,.admin-actions{width:100%}
        .actions .btn,.admin-actions .btn{flex:1}
        .dashboard-grid{grid-template-columns:1fr}
      }
      @media(max-width:380px){
        .grid,.cat-grid{grid-template-columns:1fr}
      }
      @media(prefers-reduced-motion:reduce){
        *{animation:none!important;transition:none!important}
      }

    </style>
    
  </head>

  <body>
    

    <div id="app"></div>
    

    <div id="toastZone" class="toast-zone"></div>
    

    <div
      class="sidebar-overlay"
      id="sidebarOverlay"
      onclick="closeSidebar()"
    ></div>
    


    <script>
      
/* â”€â”€ State â”€â”€ */
var state = {
  screen:'login',loginTab:'user',loading:false,loadingCategory:false,
  user:null,categories:[],categoryProgress:{},overallProgress:null,
  overallProgressLoading:false,selectedCategory:'',topics:[],
  filters:{q:'',category:'',status:'all',priority:'all'},
  busyTopics:{},busyTopic:'',
  admin:null,adminToken:'',adminUsers:[],adminDashboard:null,adminDetail:null,
  adminDetailFilter:'',adminTab:'users',adminSection:'dashboard',adminUserFilter:{q:'',status:'all'},
  userSection:'dashboard',studyTimerSec:0,studyTimerRunning:false,studyTimerInterval:null,studySessionStartedAt:null,studySessions:[],studyStats:{totalSec:0,todaySec:0,sessionCount:0},
  filterTimer:null,theme:'light',streak:0
};

/* â”€â”€ Perf cache â”€â”€ */
var CACHE_TTL = 3600000; // 1h
function cacheSet(k,v){try{localStorage.setItem('ssc_'+k,JSON.stringify({v:v,t:Date.now()}))}catch(e){}}
function cacheGet(k){try{var d=JSON.parse(localStorage.getItem('ssc_'+k)||'null');if(d&&Date.now()-d.t<CACHE_TTL)return d.v}catch(e){}return null}
function cacheClear(k){try{localStorage.removeItem('ssc_'+k)}catch(e){}}
function cacheClearPrefix(prefix){
  try{
    Object.keys(localStorage).forEach(function(k){if(k.indexOf('ssc_'+prefix)===0)localStorage.removeItem(k)});
  }catch(e){}
}
function cacheBootstrap(payload){
  if(!payload)return;
  cacheSet('bootstrap',{
    user:payload.user||state.user||null,
    categories:payload.categories||state.categories||[],
    overallProgress:payload.overallProgress||state.overallProgress||null,
    studySessions:payload.studySessions||state.studySessions||[],
    studyStats:payload.studyStats||state.studyStats||{totalSec:0,todaySec:0,sessionCount:0}
  });
}
function applyCachedBootstrap(){
  var cached=cacheGet('bootstrap');
  if(!cached||!cached.categories)return false;
  if(state.user&&cached.user&&cached.user.username&&cached.user.username!==state.user.username)return false;
  state.categories=cached.categories||state.categories;
  if(cached.overallProgress)setOverallProgress(cached.overallProgress);
  state.studySessions=cached.studySessions||state.studySessions;
  state.studyStats=cached.studyStats||state.studyStats;
  calculateStreakFromSessions();
  return true;
}
function cacheTopicList(category,topics,overallProgress){
  if(!category||!topics)return;
  cacheSet('topics_'+category,{topics:topics,overallProgress:overallProgress||state.overallProgress||null});
}
function applyCachedCategory(category){
  var cached=cacheGet('topics_'+category);
  if(!cached||!cached.topics||!cached.topics.length)return false;
  state.topics=cached.topics;
  if(cached.overallProgress)setOverallProgress(cached.overallProgress);
  updateCategoryProgress(category,state.topics);
  return true;
}

/* â”€â”€ Theme â”€â”€ */
function loadTheme(){
  var saved=localStorage.getItem('ssc_theme')||'light';
  state.theme=saved;
  document.documentElement.setAttribute('data-theme',saved);
}
function toggleTheme(){
  state.theme=state.theme==='light'?'dark':'light';
  document.documentElement.setAttribute('data-theme',state.theme);
  localStorage.setItem('ssc_theme',state.theme);
  var btn=document.getElementById('themeBtn');
  if(btn)btn.textContent=state.theme==='dark'?'Light':'Dark';
}
loadTheme();

/* â”€â”€ Streak â”€â”€ */
function calculateStreakFromSessions(){
  var days={};
  (state.studySessions||[]).forEach(function(s){days[String(s.startedAt||s.date||'').slice(0,10)]=true});
  var count=0;
  for(var i=0;i<365;i++){
    var d=new Date(Date.now()-i*86400000).toISOString().slice(0,10);
    if(days[d])count++;else if(i>0)break;
  }
  state.streak=count;
}
function loadStreak(){calculateStreakFromSessions()}
function recordStudyToday(){
  calculateStreakFromSessions();
}
loadStreak();

/* â”€â”€ Utils â”€â”€ */
function el(id){return document.getElementById(id)}
function normalizeInteractiveControls(root){
  (root||document).querySelectorAll('button:not([type])').forEach(function(btn){
    btn.setAttribute('type','button');
  });
}
document.addEventListener('click',function(e){
  var btn=e.target&&e.target.closest?e.target.closest('button'):null;
  if(btn&&!btn.hasAttribute('type'))btn.setAttribute('type','button');
},true);
document.addEventListener('submit',function(e){
  e.preventDefault();
},true);
if(window.MutationObserver){
  new MutationObserver(function(records){
    records.forEach(function(record){
      record.addedNodes.forEach(function(node){
        if(node.nodeType===1)normalizeInteractiveControls(node);
      });
    });
  }).observe(document.documentElement,{childList:true,subtree:true});
}
function escapeHtml(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function escapeAttr(s){return String(s==null?'':s).replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
function jsArg(v){return escapeAttr(JSON.stringify(String(v==null?'':v)))}
function pct(done,total){return total?Math.round(done*100/total):0}
function fmtDate(d){if(!d)return 'No expiry';try{return new Date(d).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'})}catch(e){return String(d)}}
function shortDate(d){if(!d)return 'No limit';try{var ms=new Date(d)-Date.now();if(ms<0)return 'Expired';var days=Math.ceil(ms/86400000);return days+'d left'}catch(e){return String(d)}}
function fmtTimer(s){var m=Math.floor(s/60);var sec=s%60;return String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0')}
// Fetch the CSRF token once on page load and store it
var CSRF_TOKEN = "";

async function initCsrf() {
  try {
    const r = await fetch("/api/csrf-token", { credentials: "include" });
    const data = await r.json();
    CSRF_TOKEN = data.csrfToken || "";
  } catch (e) {
    console.error("CSRF init failed", e);
  }
}

// Universal API call helper (replaces gs())
async function api(method, path, body) {
  const opts = {
    method: method.toUpperCase(),
    credentials: "include",
    headers: {
      "Content-Type": "application/json",
      "X-CSRF-Token": CSRF_TOKEN,
    },
  };
  if (body && method.toUpperCase() !== "GET") {
    opts.body = JSON.stringify(body);
  }
  const res = await fetch("/api" + path, opts);

  if (res.status === 401) {
    // Session expired
    state.user = null;
    state.admin = null;
    state.screen = "login";
    renderLogin();
    toast("Session expired. Please login again.", "err");
    throw new Error("Session expired");
  }

  const data = await res.json();
  if (!res.ok || data.ok === false) {
    throw new Error(data.error || `HTTP ${res.status}`);
  }
  return data;
}

function toast(msg,type,dur){
  var z=el('toastZone');if(!z)return;
  var d=document.createElement('div');
  d.className='toast '+(type||'');d.textContent=msg;
  z.appendChild(d);
  var t=dur||3000;
  setTimeout(function(){d.style.animation='toastOut .22s ease forwards';setTimeout(function(){d.remove()},220)},t);
}
function fail(err){toast(err&&err.message?err.message:String(err),'err')}
function render(){if(state.screen==='login')renderLogin();else if(state.screen==='user')renderUser();else if(state.screen==='admin')renderAdmin()}

/* â”€â”€ Timer â”€â”€ */
function hydrateStudy(payload){
  state.studySessions=(payload&&payload.studySessions)||state.studySessions||[];
  state.studyStats=(payload&&payload.studyStats)||state.studyStats||{totalSec:0,todaySec:0,sessionCount:0};
  calculateStreakFromSessions();
  cacheBootstrap(payload||{});
}
async function loadStudySessions(){
  if(!state.user)return;
  try{
    var r=await api('GET','/user/study-sessions');
    hydrateStudy(r);
    renderUser();
  }catch(e){fail(e)}
}
function totalStudySeconds(){
  return Number((state.studyStats&&state.studyStats.totalSec)||0)+(state.studyTimerRunning?state.studyTimerSec:0);
}
function todayStudySeconds(){
  return Number((state.studyStats&&state.studyStats.todaySec)||0)+(state.studyTimerRunning?state.studyTimerSec:0);
}
async function recordStudySession(){
  if(!state.studyTimerSec)return;
  var started=state.studySessionStartedAt||new Date(Date.now()-state.studyTimerSec*1000).toISOString();
  var r=await api('POST','/user/study-sessions',{startedAt:started,endedAt:new Date().toISOString(),durationSec:state.studyTimerSec});
  hydrateStudy(r);
}
function fmtHours(sec){
  var h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60);
  return h? h+'h '+String(m).padStart(2,'0')+'m' : m+'m';
}
function startTimer(){
  if(state.studyTimerRunning)return;
  state.studyTimerRunning=true;recordStudyToday();
  state.studySessionStartedAt=new Date().toISOString();
  state.studyTimerInterval=setInterval(function(){
    state.studyTimerSec++;
    var d=el('timerDisplay');if(d)d.textContent=fmtTimer(state.studyTimerSec);
    var b=el('timerBar');if(b)b.classList.add('timer-running');
    var today=el('studyToday');if(today)today.textContent=fmtHours(todayStudySeconds());
    var total=el('studyTotal');if(total)total.textContent=fmtHours(totalStudySeconds());
  },1000);
  var d=el('timerDisplay');if(d)d.textContent=fmtTimer(state.studyTimerSec);
  toast('Study timer started ','ok');
}
async function pauseTimer(){
  if(!state.studyTimerRunning)return;
  state.studyTimerRunning=false;
  clearInterval(state.studyTimerInterval);
  var b=el('timerBar');if(b)b.classList.remove('timer-running');
  var savedSec=state.studyTimerSec;
  try{
    await recordStudySession();
    toast('Saved study session: '+fmtTimer(savedSec),'ok');
  }catch(e){fail(e)}
  finally{
    state.studyTimerSec=0;state.studySessionStartedAt=null;
    renderUser();
  }
}
function resetTimer(){
  if(state.studyTimerRunning){clearInterval(state.studyTimerInterval)}
  state.studyTimerRunning=false;state.studyTimerSec=0;state.studySessionStartedAt=null;
  var d=el('timerDisplay');if(d)d.textContent='00:00';
}

/* â”€â”€ Sidebar mobile â”€â”€ */
function openSidebar(){
  var s=document.querySelector('.sidebar');var o=el('sidebarOverlay');
  if(s)s.classList.add('open');if(o)o.classList.add('show');
}
function closeSidebar(){
  var s=document.querySelector('.sidebar');var o=el('sidebarOverlay');
  if(s)s.classList.remove('open');if(o)o.classList.remove('show');
}

/* â”€â”€ Keyboard shortcuts â”€â”€ */
document.addEventListener('keydown',function(e){
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT')return;
  if(e.key==='/'&&state.screen==='user'){e.preventDefault();var s=document.querySelector('.filters input');if(s){s.focus();s.select()}}
  if(e.key==='t'&&state.screen==='user'){e.preventDefault();if(state.studyTimerRunning)pauseTimer();else startTimer()}
  if(e.key==='Escape'){closeModal()}
});

/* â”€â”€ Export CSV â”€â”€ */
function exportCsv(){
  if(!state.topics||!state.topics.length){toast('No topics loaded to export','err');return}
  var rows=[['Topic','Category','Subsection','Priority','Status','Completed At']];
  state.topics.forEach(function(t){
    rows.push([
      '"'+String(t.topicName||'').replace(/"/g,'""')+'"',
      '"'+String(t.category||'').replace(/"/g,'""')+'"',
      '"'+String(t.subsection||'').replace(/"/g,'""')+'"',
      t.priority||'medium',
      t.completed?'Done':'Pending',
      t.completedAt?new Date(t.completedAt).toLocaleDateString('en-IN'):''
    ]);
  });
  var csv=rows.map(function(r){return r.join(',')}).join('\
');
  var a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download='ssc_progress_'+state.selectedCategory+'_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
  toast('CSV downloaded!','ok');
}

/* â”€â”€ Mark all in subsection â”€â”€ */
async function markSubsectionDone(category,subsection,done){
  if(!state.user)return;
  var items=state.topics.filter(function(t){return t.category===category&&t.subsection===subsection&&t.completed!==done});
  if(!items.length){toast('Nothing to change','');return}
  recordStudyToday();
  for(var i=0;i<items.length;i++){
    var t=items[i];
    if(state.busyTopics[t.topicId])continue;
    t.completed=done;t.completedAt=done?new Date().toISOString():null;
    state.busyTopics[t.topicId]=true;
    try{await api('POST','/user/toggle-topic',{topicId:t.topicId})}catch(e){}
    delete state.busyTopics[t.topicId];
  }
  updateCategoryProgress(category,state.topics);
  refreshUserProgressChrome();
  renderUser();
  cacheTopicList(category,state.topics,getOverallProgress());
  toast((done?'Marked all done':'Marked all pending')+': '+subsection,'ok');
}

/* â”€â”€ Topic helpers â”€â”€ */
function topicStats(list){
  var total=list.length,done=list.filter(function(x){return x.completed}).length;
  var highPending=list.filter(function(x){return String(x.priority||'').toLowerCase()==='high'&&!x.completed}).length;
  return{total:total,done:done,pending:total-done,highPending:highPending,percent:pct(done,total)};
}
function updateCategoryProgress(category,topics){
  category=String(category||'General');
  var relevant=(topics||[]).filter(function(t){return (t.category||'General')===category});
  var s=topicStats(relevant.length?relevant:(topics||[]));
  state.categoryProgress[category]={total:s.total,done:s.done,percent:s.percent,pending:s.pending,highPending:s.highPending};
}
function totalPrepTopics(){return(state.categories||[]).reduce(function(sum,c){return sum+Number(c.total||0)},0)}
function normalizeOverallProgress(progress){
  if(!progress)return null;
  var total=Number(progress.total!==undefined?progress.total:totalPrepTopics());
  var done=Number(progress.done||0);
  done=Math.max(0,Math.min(done,total||done));
  return{total:total,done:done,pending:Math.max(0,total-done),percent:pct(done,total)};
}
function getOverallProgress(){state.overallProgress=normalizeOverallProgress(state.overallProgress);return state.overallProgress}
function setOverallProgress(progress){state.overallProgress=normalizeOverallProgress(progress);state.overallProgressLoading=false;refreshOverallProgressChrome()}
function adjustOverallProgress(delta){var o=getOverallProgress();if(!o)return;setOverallProgress({total:o.total,done:o.done+Number(delta||0)})}
async function fetchOverallProgress(){
  if(!state.user)return;
  state.overallProgressLoading=true;refreshOverallProgressChrome();
  try{
    var r=await api('GET','/user/overall-progress');
    if(!r||!r.ok){state.overallProgressLoading=false;refreshOverallProgressChrome();return}
    setOverallProgress(r.overallProgress);
  }catch(err){state.overallProgressLoading=false;refreshOverallProgressChrome()}
}
function getCategories(){
  if(state.categories&&state.categories.length){
    return state.categories.map(function(c){
      var name=c.category||c.name||'General';
      var progress=state.categoryProgress[name]||{};
      var total=Number(progress.total||c.total||0);
      var done=Number(progress.done||0);
      return{name:name,total:total,done:done,percent:pct(done,total),high:Number(c.high||0),medium:Number(c.medium||0),low:Number(c.low||0),loaded:Boolean(state.categoryProgress[name])};
    });
  }
  var map={};
  state.topics.forEach(function(t){var c=t.category||'General';if(!map[c])map[c]={total:0,done:0};map[c].total++;if(t.completed)map[c].done++});
  return Object.keys(map).map(function(name){return{name:name,total:map[name].total,done:map[name].done,percent:pct(map[name].done,map[name].total),loaded:true}});
}
function hydratePreloadedTopics(topics,categories,overallProgress){
  state.topics=topics||[];
  state.categories=categories||state.categories||[];
  state.categoryProgress={};
  state.categories.forEach(function(c){
    var name=c.name||c.category||'General';
    state.categoryProgress[name]={total:Number(c.total||0),done:Number(c.done||0),percent:Number(c.percent||0),pending:Number(c.pending||0),highPending:Number(c.highPending||0)};
  });
  if(overallProgress)setOverallProgress(overallProgress);
}
function hydrateBootstrap(payload){
  hydratePreloadedTopics(payload.topics||[],payload.categories||[],payload.overallProgress);
  hydrateStudy(payload);
  cacheBootstrap(payload);
}
function filteredTopics(){
  var q=state.filters.q.trim().toLowerCase();
  return state.topics.filter(function(t){
    if(state.filters.category&&t.category!==state.filters.category)return false;
    if(state.filters.priority!=='all'&&t.priority!==state.filters.priority)return false;
    if(state.filters.status==='done'&&!t.completed)return false;
    if(state.filters.status==='pending'&&t.completed)return false;
    if(q){var hay=[t.topicName,t.category,t.subsection].join(' ').toLowerCase();if(hay.indexOf(q)===-1)return false}
    return true;
  });
}
function currentTopicScope(){
  if(!state.selectedCategory)return state.topics;
  return state.topics.filter(function(t){return t.category===state.selectedCategory});
}
function groupTopics(list){
  var grouped={};
  list.forEach(function(t){
    var cat=t.category||'General',sub=t.subsection||'General';
    if(!grouped[cat])grouped[cat]={};
    if(!grouped[cat][sub])grouped[cat][sub]=[];
    grouped[cat][sub].push(t);
  });
  return grouped;
}
function setFilter(key,value){
  if(key==='category'){
    if(value){loadCategory(value,true)}else{state.selectedCategory='';state.filters.category='';renderUser()}
    return;
  }
  state.filters[key]=value;renderUser();
}
function setFilterDebounced(key,value){
  clearTimeout(state.filterTimer);
  state.filterTimer=setTimeout(function(){setFilter(key,value)},160);
}
function userNavigate(section){
  state.userSection=section||'dashboard';
  renderUser();
  if(state.userSection==='topics'&&state.selectedCategory)setTimeout(scrollTopics,40);
}

/* â”€â”€ Load category â”€â”€ */
async function loadCategory(category,shouldScroll){
  if(!state.user||!category)return;
  state.userSection='topics';state.selectedCategory=category;state.filters.category=category;
  if(state.topics.length>=totalPrepTopics()&&totalPrepTopics()>0){
    renderUser();
    if(shouldScroll)setTimeout(scrollTopics,40);
    return;
  }
  var usedCache=applyCachedCategory(category);
  state.loadingCategory=!usedCache;
  if(!usedCache){state.topics=[]}
  renderUser();
  if(shouldScroll)setTimeout(scrollTopics,40);
  try{
    var r=await api('GET','/user/topics?category='+encodeURIComponent(category));
    if(!r.ok){toast(r.error||'Could not load subject','err');return}
    state.topics=r.topics||[];
    setOverallProgress(r.overallProgress);
    updateCategoryProgress(category,state.topics);
    state.selectedCategory=category;state.filters.category=category;
    cacheTopicList(category,state.topics,r.overallProgress);
    cacheBootstrap(r);
    renderUser();
    if(shouldScroll)setTimeout(scrollTopics,80);
    recordStudyToday();
  }catch(err){fail(err)}
  finally{state.loadingCategory=false;renderUser();if(shouldScroll)setTimeout(scrollTopics,100)}
}

/* â”€â”€ Reload â”€â”€ */
async function reloadUser(){
  if(!state.user)return;
  state.loading=true;
  applyCachedBootstrap();
  renderUser();
  try{
    var r=await api('GET','/user/categories');
    if(!r.ok){toast(r.error||'Could not refresh','err');return}
    state.user=r.user||state.user;
    hydrateBootstrap(r);
    toast('Refreshed','ok');
  }catch(err){fail(err)}
  finally{state.loading=false;renderUser()}
}

/* â”€â”€ Toggle topic â”€â”€ */
async function toggleTopicUi(topicId,checkbox){
  state.busyTopics=state.busyTopics||{};
  if(state.busyTopics[topicId])return;
  var item=state.topics.find(function(x){return x.topicId===topicId});
  if(!item)return;
  var oldCompleted=Boolean(item.completed),oldCompletedAt=item.completedAt||null;
  var nextCompleted=checkbox?Boolean(checkbox.checked):!oldCompleted;
  item.completed=nextCompleted;item.completedAt=nextCompleted?oldCompletedAt||new Date().toISOString():null;
  state.busyTopics[topicId]=true;state.busyTopic=topicId;
  updateCategoryProgress(item.category,state.topics);
  paintTopicCheckbox(checkbox,nextCompleted,true);refreshUserProgressChrome();
  adjustOverallProgress(nextCompleted===oldCompleted?0:nextCompleted?1:-1);
  if(nextCompleted)recordStudyToday();
  try{
    var r=await api('POST','/user/toggle-topic',{topicId:topicId});
    if(!r.ok)throw new Error(r.error||'Update failed');
    var saved=Boolean(r.completed);
    if(r.overallProgress)setOverallProgress(r.overallProgress);
    else if(saved!==nextCompleted)adjustOverallProgress(saved?1:-1);
    item.completed=saved;item.completedAt=r.completedAt||null;
    updateCategoryProgress(item.category,state.topics);
    paintTopicCheckbox(checkbox,item.completed,false);refreshUserProgressChrome();
  }catch(err){
    item.completed=oldCompleted;item.completedAt=oldCompletedAt;
    updateCategoryProgress(item.category,state.topics);
    paintTopicCheckbox(checkbox,oldCompleted,false);refreshUserProgressChrome();
    adjustOverallProgress(nextCompleted===oldCompleted?0:oldCompleted?1:-1);
    fail(err);
  }finally{
    cacheTopicList(item.category,state.topics,getOverallProgress());
    delete state.busyTopics[topicId];state.busyTopic=''
  }
}

function paintTopicCheckbox(checkbox,completed,saving){
  if(!checkbox)return;
  checkbox.checked=Boolean(completed);checkbox.disabled=Boolean(saving);
  var row=checkbox.closest?checkbox.closest('.topic'):null;
  if(row){
    row.classList.toggle('saving',Boolean(saving));
    var title=row.querySelector('.topic-title');if(title)title.classList.toggle('done',Boolean(completed));
  }
}

function refreshUserProgressChrome(){
  var s=topicStats(currentTopicScope());
  var nodes={userProgressPct:s.percent+'%',userProgressDone:s.done,userProgressTotal:s.total,userPendingCount:s.pending,userHighPendingCount:s.highPending};
  Object.keys(nodes).forEach(function(id){var n=el(id);if(n)n.textContent=nodes[id]});
  var bar=el('userHeroProgressBar');if(bar)bar.style.width=s.percent+'%';
}

function refreshOverallProgressChrome(){
  var o=getOverallProgress();
  if(state.overallProgressLoading||!o){
    var pctNode=el('overallProgressPct');var msgNode=el('overallProgressMessage');
    if(pctNode)pctNode.textContent='...';if(msgNode)msgNode.textContent='Fetching overall progress...';return;
  }
  var nodes={overallProgressPct:o.percent+'%',overallProgressDone:o.done,overallProgressTotal:o.total};
  var msgNode=el('overallProgressMessage');
  if(msgNode&&!el('overallProgressDone')){
    msgNode.innerHTML='<em id="overallProgressDone" style="font-style:normal"></em>/<em id="overallProgressTotal" style="font-style:normal"></em> topics completed';
  }
  Object.keys(nodes).forEach(function(id){var n=el(id);if(n)n.textContent=nodes[id]});
}

async function resetAll(){
  if(!confirm('Reset all progress for this account?'))return;
  try{
    var r=await api('POST','/user/reset-progress',{});
    if(r&&r.ok===false){toast(r.error||'Reset failed','err');return}
    state.topics.forEach(function(t){t.completed=false;t.completedAt=null});
    state.categoryProgress={};setOverallProgress({total:totalPrepTopics(),done:0});
    state.categories.forEach(function(c){updateCategoryProgress(c.name||c.category,state.topics)});
    cacheClearPrefix('topics_');
    cacheBootstrap({user:state.user,categories:state.categories,overallProgress:getOverallProgress(),studySessions:state.studySessions,studyStats:state.studyStats});
    renderUser();toast('Progress reset','ok');
  }catch(err){fail(err)}
}

function adminPatchUser(username,changes){var u=adminFindUser(username);if(u)Object.assign(u,changes)}
function adminStatusForUser(u){
  if(u.disabled)return'disabled';
  if(u.expiresAt&&new Date(u.expiresAt)<new Date())return'expired';
  return'active';
}
function adminDaysRemainingForUser(u){
  if(!u.expiresAt)return'';
  var ms=new Date(u.expiresAt)-Date.now();
  if(ms<0)return-1;return Math.ceil(ms/86400000);
}

        '<input type="checkbox"'+(t.completed?' checked':'')+' onchange="adminToggleTopic('+jsArg(username)+','+jsArg(t.topicId)+',this)" style="accent-color:var(--brand)">'+
        '<div><div style="font-size:13px;color:var(--text)">'+escapeHtml(t.topicName)+'</div><div class="small muted">'+escapeHtml(t.category)+' - '+escapeHtml(t.subsection)+'</div></div>'+
        '<span class="pill '+escapeAttr(t.priority||'medium')+'">'+escapeHtml(t.priority||'medium')+'</span>'+
        '</div>';
    }).join(''):
    '<div class="empty" style="margin:0;border:0">No topics found.</div>')+
    '</div>'+
    (topics.length>200?'<p class="small muted" style="padding:10px">Showing 200 of '+topics.length+'. Use filter to narrow down.</p>':'')+
    '</div>';
}

function adminRefreshStatsChrome(){
  var stats={totalUsers:0,active:0,disabled:0,expired:0,expiringSoon:0,admins:0};
  (state.adminUsers||[]).forEach(function(u){
    if(u.role==='admin'){stats.admins++;return}
    stats.totalUsers++;
    if(u.status==='active')stats.active++;
    if(u.status==='disabled')stats.disabled++;
    if(u.status==='expired')stats.expired++;
    if(u.expiresAt&&u.daysRemaining>=0&&u.daysRemaining<=7)stats.expiringSoon++;
  });
  if(state.adminDashboard)state.adminDashboard.stats=Object.assign(state.adminDashboard.stats||{},stats);
}

function adminRenderUsersCardIfVisible(){renderAdmin()}

async function adminRefresh(){
  state.loading=true;
  try{
    const [dash, users] = await Promise.all([
      api('GET', '/admin/dashboard'),
      api('GET', '/admin/users?q='+(state.adminUserFilter.q||'')+'&status='+(state.adminUserFilter.status||'all'))
    ]);
    if(!dash.ok || !users.ok){toast('Admin load failed','err');return}
    state.adminDashboard=dash.dashboard;
    state.adminUsers=users.users||[];
    toast('Data refreshed','ok');
  }catch(err){fail(err)}
  finally{state.loading=false;renderAdmin()}
}

async function adminFlushCache(){
  if(!confirm('Flush browser cache and local storage for this app?'))return;
  try{
    await api('POST','/admin/flush-cache',{});
  }catch(err){/* ignore server flush errors */}
  try{cacheClearPrefix('')}catch(e){}
  try{sessionStorage.clear()}catch(e){}
  if('caches' in window){
    try{
      const keys = await caches.keys();
      await Promise.all(keys.map(function(k){return caches.delete(k)}));
    }catch(e){}
  }
  toast('Cache flushed. Reloading...','ok',1200);
  setTimeout(function(){window.location.reload()},900);
}

function scrollAdminUsers(){
  renderAdmin();
  setTimeout(function(){var n=document.querySelector('.admin-user');if(n)n.scrollIntoView({behavior:'smooth',block:'start'})},200);
}

function adminSetUserSaving(username,saving){
  var c=el('auser-'+username);if(!c)return;
  c.classList.toggle('saving',saving);
  if(!saving){c.classList.add('saved');setTimeout(function(){c.classList.remove('saved')},800)}
}

function adminUpdateUserRow(username){
  var u=adminFindUser(username);if(!u)return;
  var c=el('auser-'+username);if(!c)return;
  var tmp=document.createElement('div');tmp.innerHTML=renderAdminUserCard(u);
  c.replaceWith(tmp.firstChild);
}

function adminUserAction(username,selectEl){
  var action=selectEl&&selectEl.value;
  if(selectEl)selectEl.value='';
  if(!action)return;
  var u=adminFindUser(username)||{};
  if(action==='view')return adminViewUser(username);
  if(action==='expiry')return adminSetExpiryPrompt(username);
  if(action==='disable')return adminToggleDisabled(username,!u.disabled);
  if(action==='password')return adminResetPasswordPrompt(username);
  if(action==='role')return adminSetRolePrompt(username,u.role||'user');
  if(action==='seed')return adminSeedTopics(username);
  if(action==='reset')return adminResetProgress(username);
  if(action==='delete')return adminDeleteUser(username);
}

/* â”€â”€ Admin actions â”€â”€ */
async function adminCreateUserAction(){
  var username=(el('cu')&&el('cu').value||'').trim();
  var password=el('cp')&&el('cp').value||'';
  var name=(el('cn')&&el('cn').value||'').trim();
  var amount=Number(el('ca')&&el('ca').value||0);
  var unit=el('cunit')&&el('cunit').value||'days';
  var expiryDays=unit==='weeks'?amount*7:unit==='months'?amount*30:amount;
  try{
    var r=await api('POST','/admin/users/create',{username:username,password:password,name:name,expiryDays:expiryDays});
    if(!r.ok){toast(r.error||'Create failed','err');return}
    var total=Number(statValue('masterTopics')||0);
    var created={username:r.username||username,name:name||username,role:'user',status:'active',disabled:false,expiresAt:r.expiresAt||'',daysRemaining:'',completedTopics:0,totalTopics:total,progressPct:0,lastLoginAt:''};
    created.status=adminStatusForUser(created);created.daysRemaining=adminDaysRemainingForUser(created);
    state.adminUsers.unshift(created);adminRefreshStatsChrome();renderAdmin();
    if(el('cu'))el('cu').value='';if(el('cp'))el('cp').value='';if(el('cn'))el('cn').value='';if(el('ca'))el('ca').value='';
    toast('User created','ok');
  }catch(err){fail(err)}
}

async function adminToggleDisabled(username,disabled){
  if(!confirm((disabled?'Disable ':'Enable ')+username+'?'))return;
  adminSetUserSaving(username,true);
  try{
    var r=await api('PATCH','/admin/users/'+username+'/disable',{disabled:disabled});
    if(!r.ok){toast(r.error||'Update failed','err');return}
    adminPatchUser(username,{disabled:Boolean(r.disabled)});adminUpdateUserRow(username);toast('Updated','ok');
  }catch(err){fail(err)}finally{adminSetUserSaving(username,false)}
}

function parseExpirySpec(spec){
  spec=String(spec||'').trim().toLowerCase();if(!spec)return null;
  var m=spec.match(/^(\\d+)\\s*([dwm])$/);if(!m)return false;
  return{amount:Number(m[1]),unit:m[2]==='d'?'days':m[2]==='w'?'weeks':'months'};
}

async function adminSetExpiryPrompt(username){
  var spec=prompt('Expiry: 30d, 4w, 6m. Blank to clear.');if(spec===null)return;
  adminSetUserSaving(username,true);
  try{
    var parsed=parseExpirySpec(spec);var r;
    if(parsed===null){r=await api('PATCH','/admin/users/'+username+'/expiry',{clearExpiry:true})}
    else if(parsed===false){toast('Invalid. Use 30d, 4w, 6m.','err');return}
    else{
      var expiryDays=parsed.unit==='weeks'?parsed.amount*7:parsed.unit==='months'?parsed.amount*30:parsed.amount;
      r=await api('PATCH','/admin/users/'+username+'/expiry',{expiryDays:expiryDays});
    }
    if(!r.ok){toast(r.error||'Failed','err');return}
    adminPatchUser(username,{expiresAt:r.expiresAt||''});adminUpdateUserRow(username);toast('Expiry updated','ok');
  }catch(err){fail(err)}finally{adminSetUserSaving(username,false)}
}

async function adminResetPasswordPrompt(username){
  var pw=prompt('New password for '+username+':');if(pw===null)return;
  try{
    var r=await api('PATCH','/admin/users/'+username+'/password',{password:pw});
    if(!r.ok){toast(r.error||'Failed','err');return}toast('Password reset','ok');
  }catch(err){fail(err)}
}

async function adminSetRolePrompt(username,currentRole){
  var role=prompt('Role for '+username+' (user/admin):',currentRole||'user');if(role===null)return;
  adminSetUserSaving(username,true);
  try{
    var r=await api('PATCH','/admin/users/'+username+'/role',{role:role});
    if(!r.ok){toast(r.error||'Failed','err');return}
    var changes={role:r.role||role};if(changes.role==='admin'){changes.disabled=false;changes.expiresAt=''}
    adminPatchUser(username,changes);adminUpdateUserRow(username);toast('Role updated','ok');
  }catch(err){fail(err)}finally{adminSetUserSaving(username,false)}
}

async function adminResetProgress(username){
  if(!confirm('Reset all progress for '+username+'?'))return;
  adminSetUserSaving(username,true);
  try{
    var r=await api('POST','/admin/users/'+username+'/reset-progress',{});
    if(!r.ok){toast(r.error||'Failed','err');return}
    adminPatchUser(username,{completedTopics:0,progressPct:0});
    if(state.adminDetail&&state.adminDetail.user&&state.adminDetail.user.username===username){
      state.adminDetail.topics=(state.adminDetail.topics||[]).map(function(t){t.completed=false;t.completedAt='';return t});
      adminRefreshDetailChrome(username);
    }else{adminUpdateUserRow(username)}
    toast('Progress reset','ok');
  }catch(err){fail(err)}finally{adminSetUserSaving(username,false)}
}

async function adminSeedTopics(username){
  adminSetUserSaving(username,true);
  try{
    var r=await api('POST','/admin/users/'+username+'/seed-topics',{});
    if(!r.ok){toast(r.error||'Seed failed','err');return}
    var u=adminFindUser(username);
    if(u){adminPatchUser(username,{totalTopics:Number(r.totalMaster||u.totalTopics||0)});adminUpdateUserRow(username)}
    toast('Seeded: '+(r.count||0)+' new topics','ok');
  }catch(err){fail(err)}finally{adminSetUserSaving(username,false)}
}

async function adminDeleteUser(username){
  if(!confirm('Delete '+username+' and all their data?'))return;
  adminSetUserSaving(username,true);
  try{
    var r=await api('DELETE','/admin/users/'+username,{});
    if(!r.ok){toast(r.error||'Delete failed','err');return}
    state.adminDetail=null;
    state.adminUsers=state.adminUsers.filter(function(u){return String(u.username||'').toLowerCase()!==String(username||'').toLowerCase()});
    adminRefreshStatsChrome();renderAdmin();toast('User deleted','ok');
  }catch(err){fail(err)}finally{adminSetUserSaving(username,false)}
}

async function adminViewUser(username){
  try{
    var r=await api('GET','/admin/users/'+username+'/detail');
    if(!r.ok){toast(r.error||'Could not load user','err');return}
    state.adminDetailFilter='';state.adminDetail=r;renderAdmin();
    setTimeout(function(){var n=el('adminDetailCard');if(n)n.scrollIntoView({behavior:'smooth',block:'start'})},100);
  }catch(err){fail(err)}
}

async function adminToggleTopic(username,topicId,checkbox){
  try{
    var r=await api('POST','/admin/users/'+username+'/toggle-topic',{topicId:topicId});
    if(!r.ok){toast(r.error||'Failed','err');if(checkbox)checkbox.checked=!checkbox.checked;return}
    if(state.adminDetail&&state.adminDetail.topics){
      var t=state.adminDetail.topics.find(function(x){return x.topicId===topicId});
      if(t){t.completed=Boolean(r.completed);t.completedAt=r.completedAt||''}
    }
    adminRefreshDetailChrome(username);
  }catch(err){fail(err);if(checkbox)checkbox.checked=!checkbox.checked}
}

function adminRefreshDetailChrome(username){
  var u=adminFindUser(username);
  var topics=state.adminDetail&&state.adminDetail.topics||[];
  if(u){var done=topics.filter(function(t){return t.completed}).length;adminPatchUser(username,{completedTopics:done,progressPct:pct(done,u.totalTopics)});adminUpdateUserRow(username)}
}

async function adminToggleRegistrations(){
  var cur=state.adminDashboard&&state.adminDashboard.settings&&state.adminDashboard.settings.registrationsEnabled;
  try{
    var r=await api('POST','/admin/settings',{key:'registrationsEnabled',value:!cur});
    if(!r.ok){toast(r.error||'Failed','err');return}
    if(state.adminDashboard&&state.adminDashboard.settings)state.adminDashboard.settings.registrationsEnabled=!cur;
    renderAdmin();toast('Registrations '+((!cur)?'enabled':'disabled'),'ok');
  }catch(err){fail(err)}
}

async function adminRebuildTopics(){
  if(!confirm('Rebuild master topics from raw_files sheet?'))return;
  var btn=event&&event.target;if(btn){btn.disabled=true;btn.textContent='Building...'}
  try{
    var r=await api('POST','/admin/rebuild-topics',{});
    if(!r.ok){toast(r.error||'Rebuild failed','err');return}
    toast('Rebuilt: '+r.count+' topics across '+Object.keys(r.categories||{}).length+' subjects','ok');
  }catch(err){fail(err)}
  finally{if(btn){btn.disabled=false;btn.textContent='Rebuild'}}
}

function adminLogoutUi(){
  state.screen='login';state.admin=null;state.adminToken='';
  state.adminUsers=[];state.adminDashboard=null;state.adminDetail=null;state.adminSection='dashboard';state.adminTab='users';
  renderLogin();
}

function closeModal(){state.adminDetail=null;if(state.screen==='admin')renderAdmin()}

/* â”€â”€ Bootstrap â”€â”€ */
async function bootstrap() {
  await initCsrf();
  try {
    const r = await fetch("/api/auth/me", { credentials: "include" });
    const data = await r.json();
    if (data.ok && data.user) {
      if (data.user.role === "admin") {
        state.admin = data.user;
        state.screen = "admin";
        renderAdmin();
        adminRefresh();
      } else {
        state.user = data.user;
        state.screen = "user";
        renderUser();
        reloadUser();
      }
    } else {
      renderLogin();
    }
  } catch (e) {
    renderLogin();
  }
}
bootstrap();
