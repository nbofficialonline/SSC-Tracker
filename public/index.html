<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>SSC Prep Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root{
        --pr:#1e3a8a;--pr-d:#0f2460;--pr-l:#2d52b3;
        --gold:#f59e0b;--gold-l:#fbbf24;--gold-d:#d97706;
        --teal:#0d9488;--teal-l:#14b8a6;
        --red:#ef4444;--red-bg:#fee2e2;
        --green:#10b981;--green-bg:#d1fae5;
        --bg:#f0f4fa;--surface:#ffffff;--surface2:#f8fafd;
        --text:#1e293b;--text2:#475569;--muted:#94a3b8;
        --border:#e2e8f0;--border2:#cbd5e1;
        --shadow:0 2px 12px rgba(15,23,42,.07);
        --shadow2:0 8px 32px rgba(15,23,42,.13);
        --shadow3:0 20px 60px rgba(15,23,42,.2);
        --r:12px;--r2:20px;
        --tr:0.2s cubic-bezier(.4,0,.2,1);
        --sidebar-w:280px;
        --font:'Sora',sans-serif;
        --mono:'JetBrains Mono',monospace;
      }
      [data-theme=dark]{
        --bg:#0d1117;--surface:#161b22;--surface2:#21262d;
        --text:#e6edf3;--text2:#8b949e;--muted:#6e7681;
        --border:#30363d;--border2:#484f58;
        --shadow:0 2px 12px rgba(0,0,0,.3);
        --shadow2:0 8px 32px rgba(0,0,0,.4);
        --shadow3:0 20px 60px rgba(0,0,0,.5);
        --pr:#3b82f6;--pr-d:#2563eb;--pr-l:#60a5fa;
      }
      *{box-sizing:border-box;margin:0;padding:0}
      html,body{min-height:100%;font-family:var(--font);background:var(--bg);color:var(--text);overflow-x:hidden;transition:background .3s,color .3s}
      button,input,select{font-family:inherit}
      button{cursor:pointer}

      /* â”€â”€ Animations â”€â”€ */
      @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
      @keyframes popIn{from{opacity:0;transform:scale(.93) translateY(18px)}to{opacity:1;transform:scale(1) translateY(0)}}
      @keyframes slideLeft{from{opacity:0;transform:translateX(-100%)}to{opacity:1;transform:translateX(0)}}
      @keyframes spin{to{transform:rotate(360deg)}}
      @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
      @keyframes shimmer{100%{transform:translateX(100%)}}
      @keyframes toastIn{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}
      @keyframes toastOut{from{transform:translateX(0);opacity:1}to{transform:translateX(110%);opacity:0}}
      @keyframes checkBounce{0%{transform:scale(1)}40%{transform:scale(1.35)}70%{transform:scale(.9)}100%{transform:scale(1)}}
      @keyframes float{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-8px) rotate(2deg)}}

      /* â”€â”€ Login â”€â”€ */
      .login-page{
      min-height:100vh;display:flex;align-items:center;justify-content:center;
      padding:24px 14px;
      background:linear-gradient(135deg,#0a0f1e 0%,#0f2460 50%,#0a0f1e 100%);
      position:relative;overflow:hidden;
    }
    .login-orb{
      position:absolute;border-radius:50%;filter:blur(80px);pointer-events:none;opacity:.35;
    }
    .login-orb.a{width:400px;height:400px;background:radial-gradient(circle,#f59e0b,transparent);top:-80px;left:-100px}
    .login-orb.b{width:300px;height:300px;background:radial-gradient(circle,#0d9488,transparent);bottom:-60px;right:-60px}
    .login-card{
      width:min(460px,94vw);position:relative;z-index:1;
      padding:44px 40px;border-radius:28px;
      background:rgba(15,36,96,.35);
      border:1.5px solid rgba(245,158,11,.25);
      border-top:2px solid var(--gold);
      box-shadow:0 30px 80px rgba(0,0,0,.5);
      backdrop-filter:blur(24px);
      animation:popIn .5s ease;
    }
    .login-logo{text-align:center;margin-bottom:30px;padding-bottom:20px;border-bottom:1px solid rgba(245,158,11,.18)}
    .login-mark{
      width:76px;height:76px;margin:0 auto 14px;border-radius:22px;
      display:flex;align-items:center;justify-content:center;
      color:#fff;font-weight:800;font-size:22px;letter-spacing:.5px;
      background:linear-gradient(135deg,var(--gold),#f97316);
      box-shadow:0 0 40px rgba(245,158,11,.45);
      animation:float 4s ease-in-out infinite;
    }
    .login-logo h1{color:#fff;font-size:19px;font-weight:800;margin-bottom:4px}
    .login-logo p{color:var(--gold-l);font-size:12px;font-weight:600;letter-spacing:.3px}
    .login-logo small{display:block;margin-top:3px;color:rgba(255,255,255,.45);font-size:11px}
    .tabs{display:flex;border-bottom:1px solid rgba(255,255,255,.1);margin-bottom:22px}
    .tab{flex:1;border:0;background:transparent;color:rgba(255,255,255,.45);padding:11px 8px;font-size:13px;font-weight:700;position:relative;transition:var(--tr)}
    .tab.active{color:var(--gold)}
    .tab.active:after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:2px;background:var(--gold);border-radius:99px}
    .login-form{display:none;animation:fadeUp .22s ease}
    .login-form.active{display:block}
    .field{margin-bottom:14px}
    .field label{display:block;color:rgba(255,255,255,.7);font-size:11px;text-transform:uppercase;letter-spacing:.6px;font-weight:700;margin-bottom:7px}
    .field input,.field select{
      width:100%;min-height:44px;border:1.5px solid rgba(245,158,11,.35);border-radius:11px;
      padding:10px 13px;color:#fff;background:rgba(255,255,255,.1);font-size:14px;outline:none;transition:var(--tr);
    }
    .field input::placeholder{color:rgba(255,255,255,.4)}
    .field input:focus,.field select:focus{border-color:var(--gold);background:rgba(255,255,255,.18);box-shadow:0 0 0 3px rgba(245,158,11,.18)}
    .login-btn{
      width:100%;min-height:46px;border:0;border-radius:12px;
      background:linear-gradient(135deg,var(--gold),#f97316);
      color:#fff;font-size:14px;font-weight:800;
      display:flex;align-items:center;justify-content:center;gap:8px;
      box-shadow:0 8px 28px rgba(245,158,11,.3);transition:var(--tr);
    }
    .login-btn:hover{transform:translateY(-2px);box-shadow:0 14px 36px rgba(245,158,11,.38)}
    .login-btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
    .note{margin-top:13px;padding:11px 13px;border-radius:10px;background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);color:rgba(255,255,255,.65);font-size:12px;line-height:1.55}

    /* â”€â”€ App shell â”€â”€ */
    .app{min-height:100vh;display:grid;grid-template-columns:var(--sidebar-w) 1fr}
    .sidebar{
      height:100vh;position:sticky;top:0;
      padding:18px 12px;color:#fff;
      background:linear-gradient(170deg,var(--pr) 0%,var(--pr-d) 100%);
      box-shadow:6px 0 24px rgba(15,23,42,.15);
      animation:slideLeft .32s ease;z-index:10;
      display:flex;flex-direction:column;gap:0;overflow-y:auto;overflow-x:hidden;
      scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.15) transparent;
    }
    .sidebar::-webkit-scrollbar{width:4px}
    .sidebar::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:4px}
    .brand{display:flex;gap:11px;align-items:center;padding:10px 8px 20px;margin-bottom:14px;border-bottom:1px solid rgba(255,255,255,.11)}
    .brand-mark{
      width:42px;height:42px;border-radius:13px;flex-shrink:0;
      display:flex;align-items:center;justify-content:center;
      background:linear-gradient(135deg,var(--gold),#f97316);
      color:#fff;font-weight:800;font-size:13px;letter-spacing:.5px;
      box-shadow:0 6px 18px rgba(245,158,11,.35);
    }
    .brand h2{font-size:15px;color:#fff;font-weight:800;line-height:1.2}
    .brand p{font-size:11px;margin-top:2px;color:rgba(255,255,255,.5);font-weight:500}
    .nav{display:grid;gap:4px;margin-bottom:6px}
    .nav button{
      width:100%;border:0;border-radius:10px;background:transparent;
      color:rgba(255,255,255,.72);padding:12px 14px;
      text-align:left;font-weight:800;font-size:14px;line-height:1.25;
      transition:var(--tr);display:flex;align-items:center;gap:8px;
      white-space:normal;word-break:normal;
    }
    .nav button:hover,.nav button.active{background:rgba(245,158,11,.15);color:var(--gold-l)}
    .nav-icon{font-size:16px;width:20px;text-align:center;flex-shrink:0}
    .side-divider{height:1px;background:rgba(255,255,255,.09);margin:10px 8px}
    .side-card{
      margin-top:auto;padding:12px;border-radius:13px;
      background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);
      font-size:12px;line-height:1.5;color:rgba(255,255,255,.72);
    }
    .side-card b{display:block;color:#fff;font-size:14px;margin-bottom:3px;word-break:break-word}
    .streak-badge{
      display:inline-flex;align-items:center;gap:5px;
      background:linear-gradient(135deg,#f97316,var(--gold));
      color:#fff;border-radius:8px;padding:4px 9px;font-size:12px;font-weight:700;
      margin-top:8px;
    }

    /* â”€â”€ Main â”€â”€ */
    .main{min-width:0;padding:22px;background:var(--bg);transition:background .3s}
    .topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:18px}
    .title h1{font-size:22px;color:var(--text);font-weight:800;margin-bottom:2px}
    .title p{font-size:12px;color:var(--muted);font-weight:500}
    .actions{display:flex;gap:7px;flex-wrap:wrap;align-items:center}

    /* â”€â”€ Buttons â”€â”€ */
    .btn{
      min-height:37px;border-radius:10px;padding:7px 13px;
      border:1.5px solid transparent;font-size:12.5px;font-weight:700;
      display:inline-flex;align-items:center;justify-content:center;gap:6px;transition:var(--tr);
    }
    .btn:hover{transform:translateY(-1px)}
    .btn:active{transform:translateY(0)}
    .btn.primary{color:#fff;background:linear-gradient(135deg,var(--gold),#f97316);box-shadow:0 6px 18px rgba(245,158,11,.22)}
    .btn.dark{color:#fff;background:var(--pr);box-shadow:0 4px 14px rgba(30,58,138,.25)}
    .btn.ghost{background:var(--surface);color:var(--text2);border-color:var(--border)}
    .btn.warn{background:#fef3c7;color:#92400e;border-color:#fde68a}
    .btn.danger{background:var(--red-bg);color:#991b1b;border-color:#fecaca}
    .btn.green{background:var(--green);color:#fff;box-shadow:0 4px 14px rgba(16,185,129,.22)}
    .btn.teal{background:var(--teal);color:#fff}
    .btn.sm{min-height:30px;padding:5px 10px;font-size:12px;border-radius:8px}

    /* â”€â”€ Metrics grid â”€â”€ */
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(178px,1fr));gap:13px}
    .metric{
      background:var(--surface);border:1px solid var(--border);border-radius:16px;
      padding:16px;box-shadow:var(--shadow);position:relative;overflow:hidden;
      transition:transform .2s,box-shadow .2s,background .3s,border-color .3s;
    }
    .metric:before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--gold),var(--teal))}
    .metric:hover{transform:translateY(-2px);box-shadow:var(--shadow2)}
    .metric b{display:block;font-size:27px;color:var(--pr);line-height:1;margin-bottom:6px;font-weight:800}
    .metric span{font-size:12px;color:var(--muted);font-weight:700;display:block}
    .metric small{display:block;margin-top:6px;font-size:11px;color:var(--muted)}
    [data-theme=dark] .metric b{color:var(--pr-l)}

    /* â”€â”€ Cards â”€â”€ */
    .card{
      margin-top:13px;padding:18px;border-radius:16px;
      background:var(--surface);border:1px solid var(--border);
      box-shadow:var(--shadow);
      transition:background .3s,border-color .3s;
    }
    .card-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:13px}
    .card h3{font-size:14px;color:var(--pr);font-weight:800}
    [data-theme=dark] .card h3{color:var(--pr-l)}
    .muted{color:var(--muted)}
    .small{font-size:12px}

    /* â”€â”€ Progress bars â”€â”€ */
    .progress{height:9px;border-radius:999px;background:var(--border);overflow:hidden}
    .bar{height:100%;width:0;border-radius:999px;background:linear-gradient(90deg,var(--gold),var(--teal));transition:width .4s ease}
    .hero-progress{height:13px}

    /* â”€â”€ Filters â”€â”€ */
    .filters{display:grid;grid-template-columns:2fr repeat(3,minmax(120px,1fr));gap:9px}
    .input input,.input select{
      width:100%;min-height:39px;border:1.5px solid var(--border);border-radius:10px;
      background:var(--surface);color:var(--text);padding:8px 11px;outline:none;transition:var(--tr);font-size:13px;
    }
    .input input:focus,.input select:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(245,158,11,.13)}

    /* â”€â”€ Category grid â”€â”€ */
    .cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(172px,1fr));gap:9px}
    .cat-card{
      background:var(--surface2);border:1.5px solid var(--border);border-radius:13px;
      padding:13px 14px;text-align:left;cursor:pointer;width:100%;
      transition:var(--tr);
    }
    .cat-card:hover{border-color:var(--gold-l);transform:translateY(-2px);box-shadow:0 8px 22px rgba(245,158,11,.14)}
    .cat-card.active{border-color:var(--gold);background:linear-gradient(180deg,#fff7ed,var(--surface));box-shadow:0 10px 26px rgba(245,158,11,.16)}
    [data-theme=dark] .cat-card.active{background:linear-gradient(180deg,rgba(245,158,11,.12),var(--surface))}
    .cat-card b{display:block;font-size:13px;color:var(--text);font-weight:700;margin-bottom:5px}
    .cat-card span{display:block;font-size:11.5px;color:var(--muted);margin-bottom:7px}
    .cat-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
    .cat-count{font-size:11px;color:var(--muted);font-weight:700}

    /* â”€â”€ Topic groups â”€â”€ */
    .topic-group{
      margin-top:9px;border:1px solid var(--border);border-radius:14px;
      background:var(--surface);overflow:hidden;transition:box-shadow .2s,background .3s,border-color .3s;
    }
    .topic-group:hover{box-shadow:var(--shadow)}
    .topic-group summary{
      display:flex;align-items:center;justify-content:space-between;gap:10px;
      padding:12px 15px;cursor:pointer;list-style:none;user-select:none;
      background:var(--surface2);border-bottom:1px solid var(--border);
      transition:background .18s;
    }
    .topic-group summary::-webkit-details-marker{display:none}
    .topic-group summary:hover{background:var(--bg)}
    .group-title{font-size:13.5px;font-weight:800;color:var(--text)}
    .group-actions{display:flex;gap:6px;align-items:center}
    .subsection{padding:0 14px}
    .subsection h4{
      display:flex;justify-content:space-between;align-items:center;
      font-size:11.5px;color:var(--muted);font-weight:700;letter-spacing:.4px;text-transform:uppercase;
      padding:9px 0 6px;border-bottom:1px solid var(--border);margin-bottom:2px;
    }
    .subsection-actions{display:flex;gap:5px;align-items:center}
    .topic{
      display:grid;grid-template-columns:18px 1fr auto;
      align-items:start;gap:9px;padding:8px 0;
      border-top:1px dashed var(--border);transition:background .15s,transform .15s;border-radius:8px;
    }
    .topic:first-of-type{border-top:0}
    .topic:hover{background:var(--surface2);transform:translateX(2px);padding-left:4px;padding-right:4px}
    .topic input[type=checkbox]{
      width:17px;height:17px;margin-top:2px;accent-color:var(--gold);cursor:pointer;flex-shrink:0;
    }
    .topic input:checked{animation:checkBounce .25s ease}
    .topic-title{color:var(--text2);font-size:13px;line-height:1.35;font-weight:500}
    .done{opacity:.5;text-decoration:line-through;text-decoration-color:var(--muted)}
    .topic.saving{opacity:.65;pointer-events:none}

    /* â”€â”€ Pills â”€â”€ */
    .pill{
      display:inline-flex;align-items:center;justify-content:center;white-space:nowrap;
      border-radius:999px;border:1px solid var(--border);padding:3px 8px;
      background:var(--surface);color:var(--text2);font-size:11px;font-weight:700;
    }
    .pill.high{background:#fff7ed;color:#c2410c;border-color:#fed7aa}
    .pill.medium{background:#eff6ff;color:#1d4ed8;border-color:#bfdbfe}
    .pill.low{background:var(--surface2);color:var(--muted);border-color:var(--border)}
    .pill.active{background:var(--green-bg);color:#047857;border-color:#a7f3d0}
    .pill.disabled{background:var(--red-bg);color:#991b1b;border-color:#fecaca}
    .pill.expired{background:#fef3c7;color:#92400e;border-color:#fde68a}
    .pill.admin{background:#eef2ff;color:#3730a3;border-color:#c7d2fe}
    [data-theme=dark] .pill.high{background:rgba(249,115,22,.15);color:#fb923c;border-color:rgba(249,115,22,.3)}
    [data-theme=dark] .pill.medium{background:rgba(59,130,246,.15);color:#60a5fa;border-color:rgba(59,130,246,.3)}
    [data-theme=dark] .pill.active{background:rgba(16,185,129,.15);color:#34d399;border-color:rgba(16,185,129,.3)}

    /* â”€â”€ Topic list header â”€â”€ */
    .topic-list-head{
      margin-top:13px;padding:15px 18px;border:1px solid var(--border);border-radius:16px;
      background:linear-gradient(135deg,var(--pr),var(--pr-d));color:#fff;
      box-shadow:var(--shadow);display:flex;align-items:center;justify-content:space-between;gap:12px;
    }
    .topic-list-head h3{color:#fff;font-size:15px;font-weight:800}
    .topic-list-head p{margin-top:3px;color:rgba(255,255,255,.65);font-size:12px}
    .topic-list-head .pill{background:rgba(255,255,255,.14);border-color:rgba(255,255,255,.22);color:#fff}
    .tlh-actions{display:flex;gap:7px;align-items:center}

    /* â”€â”€ Charts â”€â”€ */
    .dashboard-grid{display:grid;grid-template-columns:1fr 1.25fr;gap:13px;margin-top:13px}
    .chart-card{min-height:230px}
    .donut-wrap{display:grid;grid-template-columns:155px 1fr;gap:16px;align-items:center}
    .donut{width:150px;height:150px;border-radius:50%;display:grid;place-items:center;box-shadow:inset 0 0 0 1px var(--border)}
    .donut-center{width:104px;height:104px;border-radius:50%;display:grid;place-items:center;background:var(--surface);box-shadow:var(--shadow);text-align:center}
    .donut-center b{display:block;color:var(--pr);font-size:24px;line-height:1;font-weight:800}
    .donut-center span{display:block;margin-top:4px;color:var(--muted);font-size:11px;font-weight:700}
    [data-theme=dark] .donut-center b{color:var(--pr-l)}
    .chart-list{display:grid;gap:9px}
    .chart-row{display:grid;gap:5px}
    .chart-row-head{display:flex;justify-content:space-between;gap:10px;color:var(--text2);font-size:12px;font-weight:700}
    .bar-track{height:9px;border-radius:999px;overflow:hidden;background:var(--border)}
    .bar-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--gold),var(--teal));transition:width .45s ease}
    .bar-fill.green{background:linear-gradient(90deg,var(--green),var(--teal-l))}
    .bar-fill.warn{background:linear-gradient(90deg,var(--gold),#f97316)}
    .bar-fill.red{background:linear-gradient(90deg,var(--red),#f97316)}

    /* â”€â”€ Hero card â”€â”€ */
    .hero-card{
      position:relative;overflow:hidden;
      background:linear-gradient(135deg,var(--surface) 0%,var(--surface2) 60%,#fff7ed 100%);
    }
    [data-theme=dark] .hero-card{background:linear-gradient(135deg,var(--surface) 0%,var(--surface2) 60%,rgba(245,158,11,.08) 100%)}
    .hero-card:after{
      content:'';position:absolute;width:160px;height:160px;right:-50px;top:-60px;
      border-radius:50%;background:rgba(245,158,11,.12);pointer-events:none;
    }

    /* â”€â”€ Study timer â”€â”€ */
    .timer-bar{
      display:flex;align-items:center;gap:10px;padding:10px 15px;border-radius:12px;
      background:var(--surface2);border:1px solid var(--border);margin-top:10px;
      font-family:var(--mono);font-size:14px;font-weight:600;color:var(--text);
      transition:background .3s,border-color .3s;
    }
    .timer-display{font-size:22px;font-weight:700;color:var(--gold);min-width:70px}
    .timer-label{font-size:11px;color:var(--muted);font-family:var(--font);font-weight:700;flex:1}
    .timer-running .timer-display{animation:pulse 1.5s ease-in-out infinite}
    .study-focus{display:grid;grid-template-columns:minmax(260px,1fr) 1.4fr;gap:13px}

    /* â”€â”€ Empty / loading â”€â”€ */
    .empty{padding:30px;text-align:center;color:var(--muted);background:var(--surface);border:1px dashed var(--border);border-radius:14px;margin-top:13px}
    .loading{min-height:200px;display:grid;place-items:center;color:var(--muted)}
    .skeleton{position:relative;overflow:hidden;background:var(--border);border-radius:10px}

    .admin-layout{display:grid;grid-template-columns:minmax(0,1fr);gap:13px}

    .switch.on{background:var(--green)}
    .switch.on:before{transform:translateX(22px)}
    .topic-admin-list{max-height:400px;overflow:auto;border:1px solid var(--border);border-radius:13px}
    .topic-admin-row{display:grid;grid-template-columns:24px 1fr auto;gap:9px;align-items:start;padding:10px 13px;border-top:1px solid var(--border)}

    <div id="app"></div>

    <script>
      
/* â”€â”€ State â”€â”€ */
var state = {
  screen:'login',loginTab:'user',loading:false,loadingCategory:false,
  user:null,categories:[],categoryProgress:{},overallProgress:null,
  overallProgressLoading:false,selectedCategory:'',topics:[],
  filters:{q:'',category:'',status:'all',priority:'all'},
  busyTopics:{},busyTopic:'',
  admin:null,adminToken:'',adminUsers:[],adminDashboard:null,adminDetail:null,
  adminDetailFilter:'',adminTab:'users',adminSection:'dashboard',adminUserFilter:{q:'',status:'all'},
  userSection:'dashboard',studyTimerSec:0,studyTimerRunning:false,studyTimerInterval:null,studySessionStartedAt:null,studySessions:[],
  filterTimer:null,theme:'light',streak:0
};

/* â”€â”€ Perf cache â”€â”€ */
var CACHE_TTL = 3600000; // 1h
function cacheSet(k,v){try{localStorage.setItem('ssc_'+k,JSON.stringify({v:v,t:Date.now()}))}catch(e){}}
function cacheGet(k){try{var d=JSON.parse(localStorage.getItem('ssc_'+k)||'null');if(d&&Date.now()-d.t<CACHE_TTL)return d.v}catch(e){}return null}
function cacheClear(k){try{localStorage.removeItem('ssc_'+k)}catch(e){}}
function userStorageKey(suffix){return state.user&&state.user.username?'ssc_'+suffix+'_'+state.user.username:''}

/* â”€â”€ Theme â”€â”€ */
function loadTheme(){
  var saved=localStorage.getItem('ssc_theme')||'light';
  state.theme=saved;
  document.documentElement.setAttribute('data-theme',saved);
}
function toggleTheme(){
  state.theme=state.theme==='light'?'dark':'light';
  document.documentElement.setAttribute('data-theme',state.theme);
  localStorage.setItem('ssc_theme',state.theme);
  var btn=document.getElementById('themeBtn');
  if(btn)btn.textContent=state.theme==='dark'?'Light':'Dark';
}
loadTheme();

/* â”€â”€ Streak â”€â”€ */
function loadStreak(){
  try{
    var data=JSON.parse(localStorage.getItem('ssc_streak')||'{}');
    var today=new Date().toISOString().slice(0,10);
    if(data.last===today){state.streak=data.count||0;return}
    var yesterday=new Date(Date.now()-86400000).toISOString().slice(0,10);
    if(data.last===yesterday){state.streak=data.count||0}else{state.streak=0}
  }catch(e){state.streak=0}
}
function recordStudyToday(){
  try{
    var today=new Date().toISOString().slice(0,10);
    var data=JSON.parse(localStorage.getItem('ssc_streak')||'{}');
    if(data.last===today)return;
    var yesterday=new Date(Date.now()-86400000).toISOString().slice(0,10);
    var count=(data.last===yesterday)?(data.count||0)+1:1;
    localStorage.setItem('ssc_streak',JSON.stringify({last:today,count:count}));
    state.streak=count;
  }catch(e){}
}
loadStreak();

/* â”€â”€ Utils â”€â”€ */
function el(id){return document.getElementById(id)}
function normalizeInteractiveControls(root){
  (root||document).querySelectorAll('button:not([type])').forEach(function(btn){
    btn.setAttribute('type','button');
  });
}
document.addEventListener('click',function(e){
  var btn=e.target&&e.target.closest?e.target.closest('button'):null;
  if(btn&&!btn.hasAttribute('type'))btn.setAttribute('type','button');
},true);
document.addEventListener('submit',function(e){
  e.preventDefault();
},true);
if(window.MutationObserver){
  new MutationObserver(function(records){
    records.forEach(function(record){
      record.addedNodes.forEach(function(node){
        if(node.nodeType===1)normalizeInteractiveControls(node);
      });
    });
  }).observe(document.documentElement,{childList:true,subtree:true});
}
function escapeHtml(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function escapeAttr(s){return String(s==null?'':s).replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
function jsArg(v){return escapeAttr(JSON.stringify(String(v==null?'':v)))}
function pct(done,total){return total?Math.round(done*100/total):0}
function fmtDate(d){if(!d)return 'No expiry';try{return new Date(d).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'})}catch(e){return String(d)}}
function shortDate(d){if(!d)return 'No limit';try{var ms=new Date(d)-Date.now();if(ms<0)return 'Expired';var days=Math.ceil(ms/86400000);return days+'d left'}catch(e){return String(d)}}
function fmtTimer(s){var m=Math.floor(s/60);var sec=s%60;return String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0')}
// Fetch the CSRF token once on page load and store it
var CSRF_TOKEN = "";

async function initCsrf() {
  try {
    const r = await fetch("/api/csrf-token", { credentials: "include" });
    const data = await r.json();
    CSRF_TOKEN = data.csrfToken || "";
  } catch (e) {
    console.error("CSRF init failed", e);
  }
}

// Universal API call helper (replaces gs())
async function api(method, path, body) {
  const opts = {
    method: method.toUpperCase(),
    credentials: "include",
    headers: {
      "Content-Type": "application/json",
      "X-CSRF-Token": CSRF_TOKEN,
    },
  };
  if (body && method.toUpperCase() !== "GET") {
    opts.body = JSON.stringify(body);
  }
  const res = await fetch("/api" + path, opts);

  if (res.status === 401) {
    // Session expired
    state.user = null;
    state.admin = null;
    state.screen = "login";
    renderLogin();
    toast("Session expired. Please login again.", "err");
    throw new Error("Session expired");
  }

  const data = await res.json();
  if (!res.ok || data.ok === false) {
    throw new Error(data.error || `HTTP ${res.status}`);
  }
  return data;
}

function toast(msg,type,dur){
  var z=el('toastZone');if(!z)return;
  var d=document.createElement('div');
  d.className='toast '+(type||'');d.textContent=msg;
  z.appendChild(d);
  var t=dur||3000;
  setTimeout(function(){d.style.animation='toastOut .22s ease forwards';setTimeout(function(){d.remove()},220)},t);
}
function fail(err){toast(err&&err.message?err.message:String(err),'err')}
function render(){if(state.screen==='login')renderLogin();else if(state.screen==='user')renderUser();else if(state.screen==='admin')renderAdmin()}

/* â”€â”€ Timer â”€â”€ */
function loadStudySessions(){
  try{
    var key=userStorageKey('study_sessions');
    state.studySessions=key?JSON.parse(localStorage.getItem(key)||'[]'):[];
  }catch(e){state.studySessions=[]}
}
function saveStudySessions(){
  try{
    var key=userStorageKey('study_sessions');
    if(key)localStorage.setItem(key,JSON.stringify(state.studySessions.slice(0,200)));
  }catch(e){}
}
function totalStudySeconds(){
  return (state.studySessions||[]).reduce(function(sum,s){return sum+Number(s.durationSec||0)},0)+(state.studyTimerRunning?state.studyTimerSec:0);
}
function todayStudySeconds(){
  var today=new Date().toISOString().slice(0,10);
  return (state.studySessions||[]).filter(function(s){return String(s.date||'').slice(0,10)===today}).reduce(function(sum,s){return sum+Number(s.durationSec||0)},0)+(state.studyTimerRunning?state.studyTimerSec:0);
}
function recordStudySession(){
  if(!state.studyTimerSec)return;
  var started=state.studySessionStartedAt||new Date(Date.now()-state.studyTimerSec*1000).toISOString();
  state.studySessions.unshift({startedAt:started,endedAt:new Date().toISOString(),date:new Date().toISOString().slice(0,10),durationSec:state.studyTimerSec});
  saveStudySessions();
}
function fmtHours(sec){
  var h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60);
  return h? h+'h '+String(m).padStart(2,'0')+'m' : m+'m';
}
function startTimer(){
  if(state.studyTimerRunning)return;
  state.studyTimerRunning=true;recordStudyToday();
  state.studySessionStartedAt=new Date().toISOString();
  state.studyTimerInterval=setInterval(function(){
    state.studyTimerSec++;
    var d=el('timerDisplay');if(d)d.textContent=fmtTimer(state.studyTimerSec);
    var b=el('timerBar');if(b)b.classList.add('timer-running');
    var today=el('studyToday');if(today)today.textContent=fmtHours(todayStudySeconds());
    var total=el('studyTotal');if(total)total.textContent=fmtHours(totalStudySeconds());
  },1000);
  var d=el('timerDisplay');if(d)d.textContent=fmtTimer(state.studyTimerSec);
  toast('Study timer started ','ok');
}
function pauseTimer(){
  if(!state.studyTimerRunning)return;
  state.studyTimerRunning=false;
  clearInterval(state.studyTimerInterval);
  var b=el('timerBar');if(b)b.classList.remove('timer-running');
  recordStudySession();
  toast('Timer paused at '+fmtTimer(state.studyTimerSec),'');
  state.studyTimerSec=0;state.studySessionStartedAt=null;
  renderUser();
}
function resetTimer(){
  if(state.studyTimerRunning){clearInterval(state.studyTimerInterval)}
  state.studyTimerRunning=false;state.studyTimerSec=0;state.studySessionStartedAt=null;
  var d=el('timerDisplay');if(d)d.textContent='00:00';
}

/* â”€â”€ Sidebar mobile â”€â”€ */
function openSidebar(){
  var s=document.querySelector('.sidebar');var o=el('sidebarOverlay');
  if(s)s.classList.add('open');if(o)o.classList.add('show');
}
function closeSidebar(){
  var s=document.querySelector('.sidebar');var o=el('sidebarOverlay');
  if(s)s.classList.remove('open');if(o)o.classList.remove('show');
}

/* â”€â”€ Keyboard shortcuts â”€â”€ */
document.addEventListener('keydown',function(e){
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT')return;
  if(e.key==='/'&&state.screen==='user'){e.preventDefault();var s=document.querySelector('.filters input');if(s){s.focus();s.select()}}
  if(e.key==='t'&&state.screen==='user'){e.preventDefault();if(state.studyTimerRunning)pauseTimer();else startTimer()}
  if(e.key==='Escape'){closeModal()}
});

/* â”€â”€ Export CSV â”€â”€ */
function exportCsv(){
  if(!state.topics||!state.topics.length){toast('No topics loaded to export','err');return}
  var rows=[['Topic','Category','Subsection','Priority','Status','Completed At']];
  state.topics.forEach(function(t){
    rows.push([
      '"'+String(t.topicName||'').replace(/"/g,'""')+'"',
      '"'+String(t.category||'').replace(/"/g,'""')+'"',
      '"'+String(t.subsection||'').replace(/"/g,'""')+'"',
      t.priority||'medium',
      t.completed?'Done':'Pending',
      t.completedAt?new Date(t.completedAt).toLocaleDateString('en-IN'):''
    ]);
  });
  var csv=rows.map(function(r){return r.join(',')}).join('\
');
  var a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download='ssc_progress_'+state.selectedCategory+'_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
  toast('CSV downloaded!','ok');
}

/* â”€â”€ Mark all in subsection â”€â”€ */
async function markSubsectionDone(category,subsection,done){
  if(!state.user)return;
  var items=state.topics.filter(function(t){return t.category===category&&t.subsection===subsection&&t.completed!==done});
  if(!items.length){toast('Nothing to change','');return}
  recordStudyToday();
  for(var i=0;i<items.length;i++){
    var t=items[i];
    if(state.busyTopics[t.topicId])continue;
    t.completed=done;t.completedAt=done?new Date().toISOString():null;
    state.busyTopics[t.topicId]=true;
    try{await api('POST','/user/toggle-topic',{topicId:t.topicId})}catch(e){}
    delete state.busyTopics[t.topicId];
  }
  updateCategoryProgress(category,state.topics);
  refreshUserProgressChrome();
  renderUser();
  toast((done?'Marked all done':'Marked all pending')+': '+subsection,'ok');
}

/* â”€â”€ Mark all in category group â”€â”€ */
async function markGroupDone(category,done){
  if(!state.user)return;
  var items=state.topics.filter(function(t){return t.category===category&&t.completed!==done});
  if(!items.length){toast('Nothing to change','');return}
  recordStudyToday();
  for(var i=0;i<items.length;i++){
    var t=items[i];
    if(state.busyTopics[t.topicId])continue;
    t.completed=done;t.completedAt=done?new Date().toISOString():null;
    state.busyTopics[t.topicId]=true;
    try{await api('POST','/user/toggle-topic',{topicId:t.topicId})}catch(e){}
    delete state.busyTopics[t.topicId];
  }
  updateCategoryProgress(category,state.topics);
  refreshUserProgressChrome();
  renderUser();
  toast((done?'Entire group done':'Group reset')+': '+category,'ok');
}

/* â”€â”€ Login â”€â”€ */
function renderLogin(){

  el('app').innerHTML=
    '<div class="login-page">'+

    '</div>'+
    '<div class="tabs">'+
    '<button class="tab '+(state.loginTab==='user'?'active':'')+'" onclick="switchTab(\'user\')">Student Login</button>'+
    '<button class="tab '+(state.loginTab==='register'?'active':'')+'" onclick="switchTab(\'register\')">Register</button>'+
    '<button class="tab '+(state.loginTab==='admin'?'active':'')+'" onclick="switchTab(\'admin\')">Admin</button>'+
    '</div>'+
    // User login
    '<div id="tabUser" class="login-form '+(state.loginTab==='user'?'active':'')+'">'+'<div class="field"><label>Username</label><input id="lu" type="text" placeholder="your username" autocomplete="username"/></div>'+'<div class="field"><label>Password</label><input id="lp" type="password" placeholder="password" autocomplete="current-password"/></div>'+'<button class="login-btn" id="loginBtn" onclick="doLogin()">Login</button>'+'</div>'+
    // Register
    '<div id="tabRegister" class="login-form '+(state.loginTab==='register'?'active':'')+'">'+'<div class="field"><label>Name</label><input id="rn" type="text" placeholder="Your full name"/></div>'+'<div class="field"><label>Username</label><input id="ru" type="text" placeholder="choose a username" autocomplete="username"/></div>'+'<div class="field"><label>Password</label><input id="rp" type="password" placeholder="min 6 chars" autocomplete="new-password"/></div>'+'<button class="login-btn" id="regBtn" onclick="doRegister()">Register</button>'+'<div class="note">Registrations may be disabled by admin. Contact your instructor for access.</div>'+'</div>'+
    // Admin login
    '<div id="tabAdmin" class="login-form '+(state.loginTab==='admin'?'active':'')+'">'+'<div class="field"><label>Admin Username</label><input id="au" type="text" placeholder="admin username" autocomplete="username"/></div>'+'<div class="field"><label>Admin Password</label><input id="ap" type="password" placeholder="password" autocomplete="current-password"/></div>'+'<button class="login-btn" id="adminLoginBtn" onclick="doAdminLogin()" style="background:linear-gradient(135deg,var(--pr-l),var(--pr))">Admin Login</button>'+'</div>'+
    '</div></div>';
  normalizeInteractiveControls(el('app'));
  setTimeout(function(){var i=el('lu');if(i)i.focus()},100);
  // Enter key support
  setTimeout(function(){
    ['lu','lp','ru','rp','rn','au','ap'].forEach(function(id){
      var inp=el(id);if(!inp)return;
      inp.addEventListener('keydown',function(e){if(e.key==='Enter'){if(state.loginTab==='user')doLogin();else if(state.loginTab==='register')doRegister();else doAdminLogin()}});
    });
  },150);
}
function switchTab(t){state.loginTab=t;renderLogin()}

async function doLogin(){
  var u=(el('lu').value||'').trim(),p=el('lp').value||'';
  if(!u||!p){toast('Enter username and password','err');return}
  var btn=el('loginBtn');btn.disabled=true;btn.innerHTML='<div class="spinner"></div> Logging in...';
  try{
    var r=await api('POST','/auth/login',{username:u,password:p});
    if(!r||!r.ok){toast(r&&r.error||'Invalid credentials','err');return}
    state.user=r.user;state.screen='user';
    hydratePreloadedTopics(r.topics||[],r.categories||[],r.overallProgress);
    cacheSet('cats_'+state.user.username,state.categories);
    var lastCat=cacheGet('lastcat_'+state.user.username);
    if(lastCat&&state.categories.find(function(c){return (c.name||c.category)===lastCat})){
      state.selectedCategory=lastCat;state.filters.category=lastCat;
    } else {
      state.selectedCategory='';state.filters.category='';
    }
    state.userSection='dashboard';
    renderUser();
  }catch(err){fail(err)}
  finally{if(btn){btn.disabled=false;btn.innerHTML='Login'}}
}

async function doRegister(){
  var n=(el('rn').value||'').trim(),u=(el('ru').value||'').trim(),p=el('rp').value||'';
  if(!u||!p){toast('Username and password required','err');return}
  var btn=el('regBtn');btn.disabled=true;btn.innerHTML='<div class="spinner"></div>';
  try{
    var r=await api('POST','/auth/register',{username:u,password:p,name:n});
    if(!r.ok){toast(r.error||'Registration failed','err');return}
    toast('Account created! Please login.','ok');switchTab('user');
  }catch(err){fail(err)}
  finally{if(btn){btn.disabled=false;btn.innerHTML='Register'}}
}

async function doAdminLogin(){
  var u=(el('au').value||'').trim(),p=el('ap').value||'';
  if(!u||!p){toast('Enter admin credentials','err');return}
  var btn=el('adminLoginBtn');btn.disabled=true;btn.innerHTML='<div class="spinner"></div>';
  try{
    var r=await api('POST','/auth/login',{username:u,password:p});

    renderAdmin();adminRefresh();

}

/* â”€â”€ Topic helpers â”€â”€ */
function topicStats(list){
  var total=list.length,done=list.filter(function(x){return x.completed}).length;
  var highPending=list.filter(function(x){return String(x.priority||'').toLowerCase()==='high'&&!x.completed}).length;
  return{total:total,done:done,pending:total-done,highPending:highPending,percent:pct(done,total)};
}
function updateCategoryProgress(category,topics){
  category=String(category||'General');
  var relevant=(topics||[]).filter(function(t){return (t.category||'General')===category});
  var s=topicStats(relevant.length?relevant:(topics||[]));
  state.categoryProgress[category]={total:s.total,done:s.done,percent:s.percent,pending:s.pending,highPending:s.highPending};
}
function totalPrepTopics(){return(state.categories||[]).reduce(function(sum,c){return sum+Number(c.total||0)},0)}
function normalizeOverallProgress(progress){
  if(!progress)return null;
  var total=Number(progress.total!==undefined?progress.total:totalPrepTopics());
  var done=Number(progress.done||0);
  done=Math.max(0,Math.min(done,total||done));
  return{total:total,done:done,pending:Math.max(0,total-done),percent:pct(done,total)};
}
function getOverallProgress(){state.overallProgress=normalizeOverallProgress(state.overallProgress);return state.overallProgress}
function setOverallProgress(progress){state.overallProgress=normalizeOverallProgress(progress);state.overallProgressLoading=false;refreshOverallProgressChrome()}
function adjustOverallProgress(delta){var o=getOverallProgress();if(!o)return;setOverallProgress({total:o.total,done:o.done+Number(delta||0)})}
async function fetchOverallProgress(){
  if(!state.user)return;
  state.overallProgressLoading=true;refreshOverallProgressChrome();
  try{
    var r=await api('GET','/user/overall-progress');
    if(!r||!r.ok){state.overallProgressLoading=false;refreshOverallProgressChrome();return}
    setOverallProgress(r.overallProgress);
  }catch(err){state.overallProgressLoading=false;refreshOverallProgressChrome()}
}
function getCategories(){
  if(state.categories&&state.categories.length){
    return state.categories.map(function(c){
      var name=c.category||c.name||'General';
      var progress=state.categoryProgress[name]||{};
      var total=Number(progress.total||c.total||0);
      var done=Number(progress.done||0);
      return{name:name,total:total,done:done,percent:pct(done,total),high:Number(c.high||0),medium:Number(c.medium||0),low:Number(c.low||0),loaded:Boolean(state.categoryProgress[name])};
    });
  }
  var map={};
  state.topics.forEach(function(t){var c=t.category||'General';if(!map[c])map[c]={total:0,done:0};map[c].total++;if(t.completed)map[c].done++});
  return Object.keys(map).map(function(name){return{name:name,total:map[name].total,done:map[name].done,percent:pct(map[name].done,map[name].total),loaded:true}});
}
function hydratePreloadedTopics(topics,categories,overallProgress){
  state.topics=topics||[];
  state.categories=categories||state.categories||[];
  state.categoryProgress={};
  state.categories.forEach(function(c){
    var name=c.name||c.category||'General';
    state.categoryProgress[name]={total:Number(c.total||0),done:Number(c.done||0),percent:Number(c.percent||0),pending:Number(c.pending||0),highPending:Number(c.highPending||0)};
  });
  if(overallProgress)setOverallProgress(overallProgress);
}
function filteredTopics(){
  var q=state.filters.q.trim().toLowerCase();
  return state.topics.filter(function(t){
    if(state.filters.category&&t.category!==state.filters.category)return false;
    if(state.filters.priority!=='all'&&t.priority!==state.filters.priority)return false;
    if(state.filters.status==='done'&&!t.completed)return false;
    if(state.filters.status==='pending'&&t.completed)return false;
    if(q){var hay=[t.topicName,t.category,t.subsection].join(' ').toLowerCase();if(hay.indexOf(q)===-1)return false}
    return true;
  });
}
function currentTopicScope(){
  if(!state.selectedCategory)return state.topics;
  return state.topics.filter(function(t){return t.category===state.selectedCategory});
}
function groupTopics(list){
  var grouped={};
  list.forEach(function(t){
    var cat=t.category||'General',sub=t.subsection||'General';
    if(!grouped[cat])grouped[cat]={};
    if(!grouped[cat][sub])grouped[cat][sub]=[];
    grouped[cat][sub].push(t);
  });
  return grouped;
}
function setFilter(key,value){
  if(key==='category'){
    if(value){loadCategory(value,true)}else{state.selectedCategory='';state.filters.category='';renderUser()}
    return;
  }
  state.filters[key]=value;renderUser();
}
function setFilterDebounced(key,value){
  clearTimeout(state.filterTimer);
  state.filterTimer=setTimeout(function(){setFilter(key,value)},160);
}
function userNavigate(section){
  state.userSection=section||'dashboard';
  renderUser();
  if(state.userSection==='topics'&&state.selectedCategory)setTimeout(scrollTopics,40);
}

/* â”€â”€ Charts â”€â”€ */
function renderDonutChart(stats){
  var deg=Math.max(0,Math.min(360,Math.round((stats.percent||0)*3.6)));
  return '<div class="donut-wrap">'+
    '<div class="donut" style="background:conic-gradient(var(--green) 0deg '+deg+'deg,var(--border) '+deg+'deg 360deg)">'+
    '<div class="donut-center"><div><b>'+stats.percent+'%</b><span>done</span></div></div>'+
    '</div>'+
    '<div class="chart-list">'+
    renderChartRow('Completed',stats.done,stats.total,'green')+
    renderChartRow('Pending',stats.pending,stats.total,'warn')+
    renderChartRow('High priority pending',stats.highPending,stats.total,'')+
    '</div></div>';
}
function renderChartRow(label,value,total,cls){
  var p=pct(value||0,total||0);
  return '<div class="chart-row"><div class="chart-row-head"><span>'+escapeHtml(label)+'</span><span>'+escapeHtml(value||0)+(total?' / '+escapeHtml(total):'')+'</span></div>'+
    '<div class="bar-track"><div class="bar-fill '+(cls||'')+'" style="width:'+p+'%"></div></div></div>';
}
function renderPriorityBars(list){
  var counts={high:0,medium:0,low:0};
  list.forEach(function(t){var p=String(t.priority||'medium').toLowerCase();if(!counts[p])counts[p]=0;counts[p]++});
  return '<div class="chart-list">'+renderChartRow('High',counts.high||0,list.length,'warn')+renderChartRow('Medium',counts.medium||0,list.length,'')+renderChartRow('Low',counts.low||0,list.length,'green')+'</div>';
}
function renderCategoryDistribution(cats){
  var total=cats.reduce(function(sum,c){return sum+Number(c.total||0)},0);
  var top=cats.slice(0,8);
  if(!top.length)return '<div class="empty">No subjects yet. Build master topics first.</div>';
  return '<div class="chart-list">'+top.map(function(c){return renderChartRow(c.name,c.total||0,total,'')}).join('')+'</div>';
}

/* â”€â”€ Render user â”€â”€ */
function renderUser(){
  if(!state.user){renderLogin();return}
  loadStudySessions();
  var s=topicStats(currentTopicScope());
  var cats=getCategories();
  var overall=getOverallProgress();
  var overallCard=state.overallProgressLoading||!overall
    ?'<div class="metric"><b id="overallProgressPct">...</b><span>Overall progress</span><small id="overallProgressMessage">Fetching your overall stats...</small></div>'
    :'<div class="metric"><b id="overallProgressPct">'+overall.percent+'%</b><span>Overall progress</span><small id="overallProgressMessage"><em id="overallProgressDone" style="font-style:normal">'+overall.done+'</em>/<em id="overallProgressTotal" style="font-style:normal">'+overall.total+'</em> topics completed</small></div>';
  var shown=filteredTopics();
  var grouped=groupTopics(shown);

  var openDetails=Boolean(state.filters.q.trim());

  var body='';

  }

  // Metrics

  body+=overallCard;

  body+='</div>';

  body+='<div class="card hero-card">';
  body+='<div class="card-head"><h3>'+escapeHtml(selectedLabel)+' progress</h3><span class="pill active">'+s.done+'/'+s.total+' done</span></div>';
  body+='<div class="progress hero-progress"><div id="userHeroProgressBar" class="bar" style="width:'+s.percent+'%"></div></div>';
  body+='<div class="chart-list" style="margin-top:12px">'+renderChartRow('Completed',s.done,s.total,'green')+renderChartRow('Pending',s.pending,s.total,'warn')+renderChartRow('High priority pending',s.highPending,s.total,'')+'</div>';
  body+='</div>';

  // Folders
  body+='<div class="card"><div class="card-head"><h3>Subjects</h3><span class="muted small">Click a folder to view topics</span></div>';
  if(!cats.length){
    body+='<div class="empty">No subjects found. Run setupRawFilesSheet() and buildMasterTopicsFromRawFiles() first.</div>';
  } else {
    body+='<div class="cat-grid">';
    body+=cats.map(function(c){
      var statusText=c.loaded?c.done+'/'+c.total+' - '+c.percent+'%':c.total+' topics';
      return '<button class="cat-card'+(state.selectedCategory===c.name?' active':'')+'" onclick="loadCategory('+jsArg(c.name)+',true)">'+
        '<div class="cat-meta"><b>'+escapeHtml(c.name)+'</b><span class="cat-count">'+(c.loaded?'Loaded':'Folder')+'</span></div>'+
        '<span>'+escapeHtml(statusText)+'</span>'+
        '<div class="progress" style="margin-top:6px"><div class="bar" style="width:'+c.percent+'%\"></div></div>'+

async function loadCategory(category,shouldScroll){
  if(!state.user||!category)return;
  state.userSection='topics';state.selectedCategory=category;state.filters.category=category;
  if(state.topics.length>=totalPrepTopics()&&totalPrepTopics()>0){
    renderUser();
    if(shouldScroll)setTimeout(scrollTopics,40);
    return;
  }
  state.loadingCategory=true;state.topics=[];
  renderUser();
  if(shouldScroll)setTimeout(scrollTopics,40);
  try{
    var r=await api('GET','/user/topics?category='+encodeURIComponent(category));
    if(!r.ok){toast(r.error||'Could not load subject','err');return}
    state.topics=r.topics||[];
    setOverallProgress(r.overallProgress);
    updateCategoryProgress(category,state.topics);
    state.selectedCategory=category;state.filters.category=category;
    cacheSet('lastcat_'+state.user.username,category);
    renderUser();
    if(shouldScroll)setTimeout(scrollTopics,80);
    recordStudyToday();
  }catch(err){fail(err)}
  finally{state.loadingCategory=false;renderUser();if(shouldScroll)setTimeout(scrollTopics,100)}
}

/* â”€â”€ Toggle topic â”€â”€ */
async function toggleTopicUi(topicId,checkbox){
  state.busyTopics=state.busyTopics||{};
  if(state.busyTopics[topicId])return;
  var item=state.topics.find(function(x){return x.topicId===topicId});
  if(!item)return;
  var oldCompleted=Boolean(item.completed),oldCompletedAt=item.completedAt||null;
  var nextCompleted=checkbox?Boolean(checkbox.checked):!oldCompleted;
  item.completed=nextCompleted;item.completedAt=nextCompleted?oldCompletedAt||new Date().toISOString():null;
  state.busyTopics[topicId]=true;state.busyTopic=topicId;
  updateCategoryProgress(item.category,state.topics);
  paintTopicCheckbox(checkbox,nextCompleted,true);refreshUserProgressChrome();
  adjustOverallProgress(nextCompleted===oldCompleted?0:nextCompleted?1:-1);
  if(nextCompleted)recordStudyToday();
  try{
    var r=await api('POST','/user/toggle-topic',{topicId:topicId});
    if(!r.ok)throw new Error(r.error||'Update failed');
    var saved=Boolean(r.completed);
    if(r.overallProgress)setOverallProgress(r.overallProgress);
    else if(saved!==nextCompleted)adjustOverallProgress(saved?1:-1);
    item.completed=saved;item.completedAt=r.completedAt||null;
    updateCategoryProgress(item.category,state.topics);
    paintTopicCheckbox(checkbox,item.completed,false);refreshUserProgressChrome();
  }catch(err){
    item.completed=oldCompleted;item.completedAt=oldCompletedAt;
    updateCategoryProgress(item.category,state.topics);
    paintTopicCheckbox(checkbox,oldCompleted,false);refreshUserProgressChrome();
    adjustOverallProgress(nextCompleted===oldCompleted?0:oldCompleted?1:-1);
    fail(err);
  }finally{delete state.busyTopics[topicId];state.busyTopic=''}
}

function paintTopicCheckbox(checkbox,completed,saving){
  if(!checkbox)return;
  checkbox.checked=Boolean(completed);checkbox.disabled=Boolean(saving);
  var row=checkbox.closest?checkbox.closest('.topic'):null;
  if(row){
    row.classList.toggle('saving',Boolean(saving));
    var title=row.querySelector('.topic-title');if(title)title.classList.toggle('done',Boolean(completed));
  }
}

function adminStatusForUser(u){
  if(u.disabled)return'disabled';

function parseExpirySpec(spec){
  spec=String(spec||'').trim().toLowerCase();if(!spec)return null;
  var m=spec.match(/^(\\d+)\\s*([dwm])$/);if(!m)return false;
  return{amount:Number(m[1]),unit:m[2]==='d'?'days':m[2]==='w'?'weeks':'months'};
}

async function adminSetExpiryPrompt(username){
  var spec=prompt('Expiry: 30d, 4w, 6m. Blank to clear.');if(spec===null)return;
  adminSetUserSaving(username,true);
  try{
    var parsed=parseExpirySpec(spec);var r;
    if(parsed===null){r=await api('PATCH','/admin/users/'+username+'/expiry',{clearExpiry:true})}
    else if(parsed===false){toast('Invalid. Use 30d, 4w, 6m.','err');return}
    else{
      var expiryDays=parsed.unit==='weeks'?parsed.amount*7:parsed.unit==='months'?parsed.amount*30:parsed.amount;
      r=await api('PATCH','/admin/users/'+username+'/expiry',{expiryDays:expiryDays});
    }
    if(!r.ok){toast(r.error||'Failed','err');return}
    adminPatchUser(username,{expiresAt:r.expiresAt||''});adminUpdateUserRow(username);toast('Expiry updated','ok');
  }catch(err){fail(err)}finally{adminSetUserSaving(username,false)}
}

  var role=prompt('Role for '+username+' (user/admin):',currentRole||'user');if(role===null)return;

  try{

    if(!r.ok){toast(r.error||'Failed','err');return}
    var changes={role:r.role||role};if(changes.role==='admin'){changes.disabled=false;changes.expiresAt=''}
    adminPatchUser(username,changes);adminUpdateUserRow(username);toast('Role updated','ok');
  }catch(err){fail(err)}finally{adminSetUserSaving(username,false)}
}

async function adminResetProgress(username){
  if(!confirm('Reset all progress for '+username+'?'))return;
  adminSetUserSaving(username,true);
  try{
    var r=await api('POST','/admin/users/'+username+'/reset-progress',{});
    if(!r.ok){toast(r.error||'Failed','err');return}
    adminPatchUser(username,{completedTopics:0,progressPct:0});
    if(state.adminDetail&&state.adminDetail.user&&state.adminDetail.user.username===username){
      state.adminDetail.topics=(state.adminDetail.topics||[]).map(function(t){t.completed=false;t.completedAt='';return t});
      adminRefreshDetailChrome(username);
    }else{adminUpdateUserRow(username)}
    toast('Progress reset','ok');
  }catch(err){fail(err)}finally{adminSetUserSaving(username,false)}
}

async function adminSeedTopics(username){
  adminSetUserSaving(username,true);
  try{
    var r=await api('POST','/admin/users/'+username+'/seed-topics',{});
    if(!r.ok){toast(r.error||'Seed failed','err');return}
    var u=adminFindUser(username);
    if(u){adminPatchUser(username,{totalTopics:Number(r.totalMaster||u.totalTopics||0)});adminUpdateUserRow(username)}
    toast('Seeded: '+(r.count||0)+' new topics','ok');
  }catch(err){fail(err)}finally{adminSetUserSaving(username,false)}
}

async function adminDeleteUser(username){
  if(!confirm('Delete '+username+' and all their data?'))return;
  adminSetUserSaving(username,true);
  try{
    var r=await api('DELETE','/admin/users/'+username,{});
    if(!r.ok){toast(r.error||'Delete failed','err');return}
    state.adminDetail=null;
    state.adminUsers=state.adminUsers.filter(function(u){return String(u.username||'').toLowerCase()!==String(username||'').toLowerCase()});
    adminRefreshStatsChrome();renderAdmin();toast('User deleted','ok');
  }catch(err){fail(err)}finally{adminSetUserSaving(username,false)}
}

async function adminViewUser(username){
  try{
    var r=await api('GET','/admin/users/'+username+'/detail');
    if(!r.ok){toast(r.error||'Could not load user','err');return}
    state.adminDetailFilter='';state.adminDetail=r;renderAdmin();
    setTimeout(function(){var n=el('adminDetailCard');if(n)n.scrollIntoView({behavior:'smooth',block:'start'})},100);
  }catch(err){fail(err)}
}

async function adminToggleTopic(username,topicId,checkbox){
  try{
    var r=await api('POST','/admin/users/'+username+'/toggle-topic',{topicId:topicId});
    if(!r.ok){toast(r.error||'Failed','err');if(checkbox)checkbox.checked=!checkbox.checked;return}
    if(state.adminDetail&&state.adminDetail.topics){
      var t=state.adminDetail.topics.find(function(x){return x.topicId===topicId});
      if(t){t.completed=Boolean(r.completed);t.completedAt=r.completedAt||''}
    }
    adminRefreshDetailChrome(username);
  }catch(err){fail(err);if(checkbox)checkbox.checked=!checkbox.checked}
}

function adminRefreshDetailChrome(username){
  var u=adminFindUser(username);
  var topics=state.adminDetail&&state.adminDetail.topics||[];
  if(u){var done=topics.filter(function(t){return t.completed}).length;adminPatchUser(username,{completedTopics:done,progressPct:pct(done,u.totalTopics)});adminUpdateUserRow(username)}
}

async function adminToggleRegistrations(){
  var cur=state.adminDashboard&&state.adminDashboard.settings&&state.adminDashboard.settings.registrationsEnabled;
  try{
    var r=await api('POST','/admin/settings',{key:'registrationsEnabled',value:!cur});
    if(!r.ok){toast(r.error||'Failed','err');return}
    if(state.adminDashboard&&state.adminDashboard.settings)state.adminDashboard.settings.registrationsEnabled=!cur;
    renderAdmin();toast('Registrations '+((!cur)?'enabled':'disabled'),'ok');
  }catch(err){fail(err)}
}

async function adminRebuildTopics(){
  if(!confirm('Rebuild master topics from raw_files sheet?'))return;
  var btn=event&&event.target;if(btn){btn.disabled=true;btn.textContent='Building...'}
  try{
    var r=await api('POST','/admin/rebuild-topics',{});
    if(!r.ok){toast(r.error||'Rebuild failed','err');return}
    toast('Rebuilt: '+r.count+' topics across '+Object.keys(r.categories||{}).length+' subjects','ok');
  }catch(err){fail(err)}
  finally{if(btn){btn.disabled=false;btn.textContent='Rebuild'}}
}

function adminLogoutUi(){
  state.screen='login';state.admin=null;state.adminToken='';
  state.adminUsers=[];state.adminDashboard=null;state.adminDetail=null;state.adminSection='dashboard';state.adminTab='users';
  renderLogin();
}

function closeModal(){state.adminDetail=null;if(state.screen==='admin')renderAdmin()}

/* â”€â”€ Bootstrap â”€â”€ */
async function bootstrap() {
  await initCsrf();
  try {
    const r = await fetch("/api/auth/me", { credentials: "include" });
    const data = await r.json();
    if (data.ok && data.user) {
      if (data.user.role === "admin") {
        state.admin = data.user;
        state.screen = "admin";
        renderAdmin();
        adminRefresh();
      } else {
        state.user = data.user;
        state.screen = "user";
        var cachedCats = cacheGet("cats_" + state.user.username);
        if (cachedCats) {
          state.categories = cachedCats;
        }
        renderUser();
        reloadUser();
      }
    } else {
      renderLogin();
    }
  } catch (e) {
    renderLogin();
  }
}
bootstrap();

    </script>
